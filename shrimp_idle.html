<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shrimp Idle</title>
<style>
  :root{
    --bg:#081420;
    --panel:#0d1c2c;
    --line:#1f3d5c;
    --text:#eef6ff;
    --blue:#2e6cff;
    --blue2:#4c84ff;
    --blue3:#6a9bff;
    --purple:#7e49ff;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui, Arial, sans-serif;
    overflow:hidden;
  }

  #topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    min-height:58px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:4px;
    font-size:14px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    z-index:5;
    padding:7px 38px 7px 10px;
    text-align:center;
  }

  #topline{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;
    width:100%;
    white-space:nowrap;
  }

  #typeline{
    width:100%;
    white-space:nowrap;
    font-weight:700;
    opacity:.9;
  }

  #topbar span{
    white-space:nowrap;
  }

  #gameTitle{
    position:fixed;
    top:66px;
    left:0;
    right:0;
    text-align:center;
    font-size:18px;
    font-weight:700;
    letter-spacing:.35px;
    pointer-events:none;
    z-index:5;
    transition:color .25s linear, transform .18s ease-out;
    text-shadow:0 0 12px rgba(255,255,255,.06);
  }

  #studioTag{
    font-size:11px;
    opacity:.55;
    letter-spacing:.4px;
    margin-top:2px;
  }

  #statusText{
    position:fixed;
    top:112px;
    left:50%;
    transform:translateX(-50%);
    max-width:min(88vw, 720px);
    text-align:center;
    font-size:14px;
    color:rgba(238,246,255,.82);
    text-shadow:0 2px 10px rgba(0,0,0,.35);
    z-index:5;
    pointer-events:none;
    opacity:0;
    transition:opacity .7s ease;
    padding:0 12px;
    line-height:1.35;
  }

#achBtn{
  position:fixed;
  right:10px;
  top:8px;
  cursor:pointer;
  opacity:.85;
  z-index:6;
  user-select:none;
  font-size:18px;
  min-width:auto;
  width:30px;
  height:30px;
  padding:0;
  border:none;
  border-radius:8px;
  background:transparent;
  color:var(--text);
  box-shadow:none;
  line-height:30px;
}
#achBtn:focus-visible{
  outline:2px solid rgba(143,212,255,.75);
  outline-offset:2px;
}


  #achievements{
    position:fixed;
    top:64px;
    right:10px;
    width:210px;
    max-height:260px;
    overflow:auto;
    background:#102238;
    border:1px solid #254566;
    border-radius:12px;
    padding:10px;
    display:none;
    z-index:6;
    font-size:12px;
    line-height:1.45;
    box-shadow:0 8px 20px rgba(0,0,0,.35);
  }

  #achievements .locked{
    opacity:.5;
  }

  #achievements .title{
    font-weight:700;
    margin-bottom:6px;
  }

  canvas{
    display:block;
    width:100vw;
    height:calc(100vh - 158px);
    margin-top:92px;
    background:#0d2136;
  }

  #controls{
    position:fixed;
    bottom:10px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:10px;
    z-index:5;
    flex-wrap:wrap;
    padding:0 10px;
  }

  button{
    border:none;
    padding:10px 16px;
    border-radius:999px;
    background:var(--blue);
    color:white;
    font-size:14px;
    cursor:pointer;
    min-width:120px;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }

  button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  #buy10{ background:var(--blue2); }
  #buyMax{ background:var(--blue3); }
  #prestige{ background:var(--purple); }

  #styleOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    background:rgba(3,8,14,.78);
    backdrop-filter:blur(8px);
    padding:18px;
  }

  #styleCard{
    width:min(92vw,560px);
    background:linear-gradient(180deg,rgba(15,32,51,.96),rgba(8,17,30,.98));
    border:1px solid rgba(157,211,255,.35);
    border-radius:22px;
    box-shadow:0 20px 70px rgba(0,0,0,.45);
    padding:20px;
    color:var(--text);
    transform:translateY(18px);
    opacity:0;
    transition:opacity .45s ease, transform .45s ease;
  }

  #styleOverlay.show #styleCard{
    transform:translateY(0);
    opacity:1;
  }

  #styleCard h2{
    margin:0 0 4px;
    font-size:24px;
    text-align:center;
    color:#bfe8ff;
  }

  #styleCard .styleSub{
    text-align:center;
    opacity:.68;
    font-size:13px;
    margin-bottom:18px;
  }

  .styleSection{
    margin-top:14px;
  }

  .styleSectionTitle{
    font-size:13px;
    opacity:.75;
    margin-bottom:8px;
    letter-spacing:.3px;
  }

  .styleGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:9px;
  }

  .styleChoice{
    min-width:0;
    border:1px solid rgba(157,211,255,.24);
    border-radius:14px;
    background:rgba(255,255,255,.04);
    color:var(--text);
    padding:10px;
    text-align:left;
    box-shadow:none;
  }

  .styleChoice.selected{
    border-color:#8fd4ff;
    box-shadow:0 0 18px rgba(143,212,255,.18);
    background:rgba(143,212,255,.10);
  }

  .swatch{
    width:100%;
    height:34px;
    border-radius:10px;
    margin-bottom:7px;
    border:1px solid rgba(255,255,255,.15);
  }

  #applyStyle{
    margin-top:16px;
    width:100%;
    background:linear-gradient(180deg,#2e6cff,#1949bd);
    text-align:center;
  }


  @media (max-width: 720px){
    #topbar{
      gap:4px;
      font-size:12px;
      padding-right:34px;
    }

    #topline{
      gap:12px;
    }

    #gameTitle{
      top:76px;
      font-size:17px;
    }

    #statusText{
      top:126px;
      font-size:13px;
    }

    canvas{
      height:calc(100vh - 170px);
      margin-top:104px;
    }

    button{
      min-width:108px;
      font-size:13px;
      padding:10px 12px;
    }

    #achievements{
      width:180px;
    }

    #studioTag{
      font-size:10px;
    }
  }

.achievementItem{
  margin: 8px 0;
  padding: 8px 9px;
  border-radius: 10px;
  background: rgba(255,255,255,.045);
}
.achievementName{
  font-weight: 800;
  color: #eef7ff;
}
.achievementDesc{
  font-size: 12px;
  opacity: .78;
  margin-top: 2px;
}
.achievementFlavor{
  font-size: 11px;
  opacity: .58;
  margin-top: 3px;
  font-style: italic;
}
.achievementItem.locked{
  opacity: .45;
}

</style>
</head>

function canvasHeight(){
  return Math.max(220, window.innerHeight - (window.innerWidth <= 720 ? 150 : 138));
}

function resize(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const h = canvasHeight();
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

};

let cachedBuyMaxShrimp = -1;

function invalidateBuyMaxCache(){
  cachedBuyMaxCount = 0;
  cachedBuyMaxCoins = -1;
  cachedBuyMaxShrimp = -1;
}

function saveGame(){
  state.lastSavedAt = Date.now();

  const data = {
    coins: state.coins,
    shrimp: state.shrimp,
    shells: state.shells,
    prestige: state.prestige,
    mutantCount: state.mutantCount,
    totalShrimpEver: state.totalShrimpEver,
    substrateStyle: state.substrateStyle,
    backgroundStyle: state.backgroundStyle,
    plantSlots: state.plantSlots,
    plantPool: state.plantPool,
    plantSeed: state.plantSeed,
    velvetSeen: state.velvetSeen,
    mythicalSeen: state.mythicalSeen,
    stillnessSeen: state.stillnessSeen,
    watcherSeen: state.watcherSeen,
    gapSeen: state.gapSeen,
    oscarSeen: state.oscarSeen,
    blastSeen: state.blastSeen,
    rootedSeen: state.rootedSeen,
    list: state.list,
    mutationsSeen: state.mutationsSeen,
    achievements: state.achievements,
    triggeredMilestones: state.triggeredMilestones,
    breedProgress: state.breedProgress,
    lastSavedAt: state.lastSavedAt
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    state = { ...state, ...data };

    if(typeof state.lastFrameTime !== "number") state.lastFrameTime = 0;
    if(typeof state.saveTimer !== "number") state.saveTimer = 0;
    if(typeof state.mutantCount !== "number") state.mutantCount = 0;
    if(typeof state.totalShrimpEver !== "number") state.totalShrimpEver = Math.max(1, state.shrimp || 1);
    if(!state.substrateStyle) state.substrateStyle = "black";
    if(!state.backgroundStyle) state.backgroundStyle = "purple";
    if(!Array.isArray(state.plantSlots)) state.plantSlots = [];
    if(!Array.isArray(state.plantPool)) state.plantPool = [];
    if(typeof state.plantSeed !== "number") state.plantSeed = 0;
    if(typeof state.velvetSeen !== "boolean") state.velvetSeen = false;
    if(typeof state.mythicalSeen !== "boolean") state.mythicalSeen = false;
    if(typeof state.stillnessSeen !== "boolean") state.stillnessSeen = false;
    if(typeof state.watcherSeen !== "boolean") state.watcherSeen = false;
    if(typeof state.gapSeen !== "boolean") state.gapSeen = false;
    if(typeof state.oscarSeen !== "boolean") state.oscarSeen = false;
    if(typeof state.blastSeen !== "boolean") state.blastSeen = false;
    if(typeof state.rootedSeen !== "boolean") state.rootedSeen = false;
    if(typeof state.activeEventType !== "string") state.activeEventType = null;
    if(typeof state.eventEndsAt !== "number") state.eventEndsAt = 0;
    if(typeof state.oscarStart !== "number") state.oscarStart = 0;
    if(typeof state.prestigePulse !== "number") state.prestigePulse = 0;
    if(typeof state.breedProgress !== "number") state.breedProgress = 0;
    if(typeof state.lastSavedAt !== "number") state.lastSavedAt = Date.now();
    if(!Array.isArray(state.list)) state.list = [];
    if(!Array.isArray(state.achievements)) state.achievements = [];
    if(!Array.isArray(state.triggeredMilestones)) state.triggeredMilestones = [];

    const visibleMutants = state.list.filter(s => s && s.mutant).length;
    if(state.mutantCount < visibleMutants) state.mutantCount = visibleMutants;
    if(state.mutantCount > state.shrimp) state.mutantCount = state.shrimp;
  } catch(e){
    console.error("Load failed:", e);
  }
}
if(!state.plantSeed) state.plantSeed = Math.floor(Math.random() * 999999999);
loadGame();
if(!state.plantSeed) state.plantSeed = Math.floor(Math.random() * 999999999);
if(!Array.isArray(state.plantPool) || state.plantPool.length === 0) buildPlantPool();

function formatNumber(n){
  if(n >= 1000000) return (n / 1000000).toFixed(2).replace(/\.00$/, "") + "M";
  if(n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return Math.floor(n).toString();
}

function shrimpCostForCount(count){
  return Math.floor(8 * Math.pow(1.085, count - 1));
}

function shrimpCost(){
  return shrimpCostForCount(state.shrimp);
}

function prestigeCost(){
  return Math.floor(250 * Math.pow(1.75, state.prestige));
}

function totalCostForNextShrimp(amount){
  let total = 0;
  let tempShrimp = state.shrimp;
  for(let i = 0; i < amount; i++){
    total += shrimpCostForCount(tempShrimp);
    tempShrimp++;
  }
  return total;
}

function affordableShrimpCount(){
  let total = 0;
  let count = 0;
  let tempShrimp = state.shrimp;
  const coins = state.coins;

  while(true){
    const cost = shrimpCostForCount(tempShrimp);
    if(total + cost > coins) break;
    total += cost;
    tempShrimp++;
    count++;
    if(count >= 10000) break;
  }

  return count;
}

function getCachedBuyMaxCount(){
  const flooredCoins = Math.floor(state.coins);
  if(cachedBuyMaxCoins !== flooredCoins || cachedBuyMaxShrimp !== state.shrimp){
    cachedBuyMaxCoins = flooredCoins;
    cachedBuyMaxShrimp = state.shrimp;
    cachedBuyMaxCount = affordableShrimpCount();
  }
  return cachedBuyMaxCount;
}

function incomePerSecond(){
  const normalCount = Math.max(0, state.shrimp - state.mutantCount);
  const totalValue = normalCount + state.mutantCount * 3;
  return (totalValue + 1) * (1 + state.shells * 0.45);
}

function mutationChance(){
  return 0.01 + state.prestige * 0.005;
}

function currentVariant(){
  if(state.prestige >= shrimpVariants.length){
    return null;
  }
  return shrimpVariants[state.prestige];
}

function currentShrimpType(){
  const v = currentVariant();
  return v ? v.name : "Chaos Morph";
}

function currentPrestigeMessage(){
  const idx = Math.max(0, Math.min(state.prestige - 1, prestigeMessages.length - 1));
  return prestigeMessages[idx];
}

function getSubstrateStyle(){
  return substrates.find(s => s.id === state.substrateStyle) || substrates[0];
}

function getBackgroundStyle(){
  return backgrounds.find(b => b.id === state.backgroundStyle) || backgrounds[1];
}

function randomFrom(list){
  return list[Math.floor(Math.random() * list.length)];
}

function randomizeJarStyle(){
  const currentSubstrate = state.substrateStyle;
  const currentBackground = state.backgroundStyle;

  let nextSubstrate = randomFrom(substrates).id;
  let nextBackground = randomFrom(backgrounds).id;

  if(substrates.length > 1){
    while(nextSubstrate === currentSubstrate){
      nextSubstrate = randomFrom(substrates).id;
    }
  }

  if(backgrounds.length > 1){
    while(nextBackground === currentBackground){
      nextBackground = randomFrom(backgrounds).id;
    }
  }

  state.substrateStyle = nextSubstrate;
  state.backgroundStyle = nextBackground;
}

function currentJarStyleName(){
  const sub = getSubstrateStyle();
  const bg = getBackgroundStyle();
  return `${sub.name} / ${bg.name}`;
}

function renderStyleChoices(){
  substrateChoicesEl.replaceChildren();
  backgroundChoicesEl.replaceChildren();

  for(const s of substrates){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "styleChoice" + (pendingStyle.substrate === s.id ? " selected" : "");
    btn.addEventListener("click", () => chooseSubstrateStyle(s.id));

    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.background = `linear-gradient(135deg,${s.colors[0]},${s.colors[1]},${s.colors[2]})`;

    const label = document.createElement("strong");
    label.textContent = s.name;

    btn.append(swatch, label);
    substrateChoicesEl.appendChild(btn);
  }

  for(const b of backgrounds){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "styleChoice" + (pendingStyle.background === b.id ? " selected" : "");
    btn.addEventListener("click", () => chooseBackgroundStyle(b.id));

    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.background = `linear-gradient(180deg,${b.top},${b.mid},${b.bottom})`;

    const label = document.createElement("strong");
    label.textContent = b.name;

    btn.append(swatch, label);
    backgroundChoicesEl.appendChild(btn);
  }
}


function chooseSubstrateStyle(id){
  pendingStyle.substrate = id;
  renderStyleChoices();
}

function chooseBackgroundStyle(id){
  pendingStyle.background = id;
  renderStyleChoices();
}

function showStyleOverlay(){
  pendingStyle = {
    substrate: state.substrateStyle || "black",
    background: state.backgroundStyle || "purple"
  };
  renderStyleChoices();
  styleOverlay.style.display = "flex";
  requestAnimationFrame(() => styleOverlay.classList.add("show"));
}

function hideStyleOverlay(){
  styleOverlay.classList.remove("show");
  setTimeout(() => {
    styleOverlay.style.display = "none";
  }, 350);
}

function applyStyleChoice(){
  state.substrateStyle = pendingStyle.substrate || state.substrateStyle || "black";
  state.backgroundStyle = pendingStyle.background || state.backgroundStyle || "purple";
  hideStyleOverlay();
  saveGame();
}

function currentTitleColor(t){
  if(state.prestige >= shrimpVariants.length){
    return shrimpVariants[Math.floor(t / 300) % shrimpVariants.length].color;
  }
  return currentVariant().color;
}

function enqueueStatus(text, duration = 4500, delay = 400){
  if(!text) return;
  statusQueue.push({
    text,
    duration,
    delay,
    createdAt: performance.now()
  });
}

function showStatus(text, duration = 4500, delay = 400){
  enqueueStatus(text, duration, delay);
}

function updateStatusText(now){
  if(currentStatusShowing && currentStatusTimeout && now > currentStatusTimeout){
    statusTextEl.style.opacity = "0";
    currentStatusShowing = false;
    currentStatusTimeout = 0;
  }

  if(!currentStatusShowing && statusQueue.length > 0){
    const next = statusQueue[0];
    if(now - next.createdAt >= next.delay){
      statusQueue.shift();
      statusTextEl.textContent = next.text;
      statusTextEl.style.opacity = "1";
      currentStatusShowing = true;
      currentStatusTimeout = now + next.duration;
    }
  }
}

function applyOfflineProgress(){
  const elapsedMs = Math.max(0, Date.now() - (state.lastSavedAt || Date.now()));
  const offlineSeconds = Math.min(MAX_OFFLINE_SECONDS, elapsedMs / 1000);

  if(offlineSeconds < 10) return;

  const earned = incomePerSecond() * offlineSeconds;
  state.coins += earned;
  invalidateBuyMaxCache();
  showStatus(`Welcome back. The colony earned ${formatNumber(earned)} coins while you were away.`, 6500, 700);
}

function checkMilestones(){
  for(const m of milestones){
    if(state.shrimp >= m.threshold && !state.triggeredMilestones.includes(m.threshold)){
      state.triggeredMilestones.push(m.threshold);
      showStatus(m.text, 5200, 400);
    }
  }
}

function passiveBreed(dtSec){
  state.breedProgress += state.shrimp * BREED_RATE_PER_SHRIMP * dtSec;

  let births = 0;
  while(state.breedProgress >= 1 && births < 500){
    addSingleShrimp();
    state.breedProgress -= 1;
    births++;
  }

  if(births > 0){
    syncShrimp();
    unlockAchievements();
    invalidateBuyMaxCache();
  }
}

function jar(){
  const usableHeight = canvasHeight();
  const w = Math.min(window.innerWidth * 0.78, 430);
  const h = Math.min(usableHeight * 0.72, 340);
  return {
    x: window.innerWidth / 2,
    y: usableHeight / 2 + 18,
    w,
    h
  };
}

function randomVariantIndex(){
  return Math.floor(Math.random() * shrimpVariants.length);
}

function currentVariantIndex(){
  if(state.prestige >= shrimpVariants.length){
    return randomVariantIndex();
  }
  return state.prestige;
}

function newShrimpVisual(mutantOverride){
  const j = jar();
  const mutant = typeof mutantOverride === "boolean" ? mutantOverride : (Math.random() < mutationChance());
  if(mutant && typeof mutantOverride !== "boolean"){
    state.mutantCount++;
    state.mutationsSeen++;
  }

  const marginX = 42;
  const marginY = 72;

  return {
    x: j.x - j.w/2 + marginX + Math.random() * Math.max(1, j.w - marginX * 2),
    y: j.y - j.h/2 + marginY + Math.random() * Math.max(1, j.h - marginY - 58),
    vx: (Math.random() - 0.5) * 0.55 || 0.2,
    vy: (Math.random() - 0.5) * 0.22,
    bob: Math.random() * Math.PI * 2,
    mutant,
    variantIndex: currentVariantIndex(),
    scale: 0.9 + Math.random() * 0.18
  };
}

function syncShrimp(){
  const visible = Math.min(state.shrimp, 80);

  if(!Array.isArray(state.list)){
    state.list = [];
  }

  state.list = state.list.filter(s =>
    s &&
    Number.isFinite(s.x) &&
    Number.isFinite(s.y) &&
    Number.isFinite(s.vx) &&
    Number.isFinite(s.vy)
  );

  while(state.list.length < visible){
    state.list.push(newShrimpVisual(false));
  }

  while(state.list.length > visible){
    state.list.pop();
  }

  // Repair missing visual fields from older saves.
  for(const s of state.list){
    if(typeof s.bob !== "number") s.bob = Math.random() * Math.PI * 2;
    if(typeof s.scale !== "number") s.scale = 0.9 + Math.random() * 0.18;
    if(typeof s.variantIndex !== "number") s.variantIndex = currentVariantIndex();
    if(typeof s.mutant !== "boolean") s.mutant = false;
  }
}

function addSingleShrimp(){
  const mutant = Math.random() < mutationChance();
  if(mutant){
    state.mutantCount++;
    state.mutationsSeen++;
    showStatus("irregularity detected", 2600, 220);
  }

  state.shrimp++;
  state.totalShrimpEver++;

  if(state.list.length < 80){
    const visual = newShrimpVisual(mutant);

    // Blast from the Past: 1/1000 on purchased/spawned shrimp, only after a few cycles.
    if(state.prestige >= 3 && !state.blastSeen && Math.random() < 0.001){
      const pastMax = Math.max(0, currentVariantIndex() - 1);
      visual.variantIndex = Math.floor(Math.random() * Math.max(1, pastMax + 1));
      visual.blast = true;
      state.blastSeen = true;
      showStatus("Blast from the Past: Why did this shrimp know how to time travel?", 5200, 0);
    }

    state.list.push(visual);
  }
}

function buyAmount(amount){
  if(amount <= 0) return;

  let bought = 0;
  for(let i = 0; i < amount; i++){
    const c = shrimpCost();
    if(state.coins < c) break;
    state.coins -= c;
    addSingleShrimp();
    bought++;
  }

  if(bought > 0){
    syncShrimp();
    unlockAchievements();
    invalidateBuyMaxCache();
    saveGame();
  }
}

function buyShrimp(){
  buyAmount(1);
}

function buyTen(){
  buyAmount(10);
}

function buyMax(){
  const amount = getCachedBuyMaxCount();
  if(amount > 0){
    buyAmount(amount);
  }
}

function doPrestige(){
  const c = prestigeCost();
  if(state.coins < c) return;

  state.shells++;
  state.prestige++;
  state.coins = 0;
  state.shrimp = 1;
  state.mutantCount = 0;
  state.breedProgress = 0;
  state.triggeredMilestones = [];
  state.list = [];
  state.plantSlots = [];
  state.plantPool = [];
  state.plantSeed = Math.floor(Math.random() * 999999999);
  state.eventActive = false;
  state.activeEventType = null;
  state.eventEndsAt = 0;
  buildPlantPool();
  state.flash = 1.2;
  state.prestigePulse = 1;

  syncShrimp();
  unlockAchievements();
  randomizeJarStyle();
  showStatus(currentPrestigeMessage(), 5200, 500);
  showStatus(`New jar: ${currentJarStyleName()}`, 4200, 1100);
  invalidateBuyMaxCache();
  saveGame();
}

buyBtn.onclick = ()=>{state.lastClickTime=Date.now();buyShrimp();};
buy10Btn.onclick = ()=>{state.lastClickTime=Date.now();buyTen();};
buyMaxBtn.onclick = ()=>{state.lastClickTime=Date.now();buyMax();};
prestigeBtn.onclick = doPrestige;
applyStyleBtn.onclick = applyStyleChoice;

achBtn.onclick = () => {
  achPanel.style.display = achPanel.style.display === "block" ? "none" : "block";
};

function unlockAchievements(){
  for(const a of achievements){
    if(a.test(state) && !state.achievements.includes(a.id)){
      state.achievements.push(a.id);
      showStatus(`${a.name}: ${a.flavor || a.desc || "Unlocked."}`, 4200, 0);
    }
  }
}


function renderAchievements(){
  achPanel.innerHTML =
    `<div class="title">Achievements</div>` +
    achievements.map(a => {
      const unlocked = state.achievements.includes(a.id);
      return `
        <div class="${unlocked ? "achievementItem" : "achievementItem locked"}">
          <div class="achievementName">${unlocked ? "✓" : "○"} ${a.name}</div>
          <div class="achievementDesc">${a.desc || ""}</div>
          <div class="achievementFlavor">${a.flavor || ""}</div>
        </div>
      `;
    }).join("");
}


function drawBackground(){
  const usableHeight = canvasHeight();
  ctx.clearRect(0, 0, window.innerWidth, usableHeight);

  const b = getBackgroundStyle();
  const bg = ctx.createLinearGradient(0, 0, 0, usableHeight);
  bg.addColorStop(0, b.top);
  bg.addColorStop(0.55, b.mid);
  bg.addColorStop(1, b.bottom);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, window.innerWidth, usableHeight);

  const glow = ctx.createRadialGradient(window.innerWidth/2, usableHeight*0.35, 20, window.innerWidth/2, usableHeight*0.35, usableHeight*0.72);
  glow.addColorStop(0, "rgba(120,190,210,.10)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, window.innerWidth, usableHeight);

  for(let i = 0; i < 8; i++){
    ctx.fillStyle = "rgba(255,255,255,.014)";
    ctx.fillRect(i * (window.innerWidth / 7), 0, 14, usableHeight);
  }

  if(state.prestige >= shrimpVariants.length){
    ctx.fillStyle = "rgba(140,90,255,.08)";
    ctx.fillRect(0, 0, window.innerWidth, usableHeight);
  }

  for(let i = 0; i < 24; i++){
    ctx.fillStyle = "rgba(255,255,255,.022)";
    const px = (i * 131) % Math.max(1, window.innerWidth);
    const py = (i * 59) % Math.max(1, usableHeight);
    ctx.fillRect(px, py, 2, 2);
  }
}

function roundedJarPath(j){
  const left = j.x - j.w/2;
  const top = j.y - j.h/2;
  const right = j.x + j.w/2;
  const bottom = j.y + j.h/2;
  const shoulder = Math.min(42, j.w * 0.12);
  const r = Math.min(30, j.w * 0.08);

  ctx.beginPath();
  ctx.moveTo(left + shoulder, top + 28);
  ctx.quadraticCurveTo(left + 6, top + 28, left + 6, top + shoulder + 18);
  ctx.lineTo(left + 6, bottom - r);
  ctx.quadraticCurveTo(left + 6, bottom - 4, left + r + 4, bottom - 4);
  ctx.lineTo(right - r - 4, bottom - 4);
  ctx.quadraticCurveTo(right - 6, bottom - 4, right - 6, bottom - r);
  ctx.lineTo(right - 6, top + shoulder + 18);
  ctx.quadraticCurveTo(right - 6, top + 28, right - shoulder, top + 28);
  ctx.lineTo(left + shoulder, top + 28);
}

function drawSubstrateLayer(j){
  const s = getSubstrateStyle();
  const left = j.x - j.w/2 + 16;
  const right = j.x + j.w/2 - 16;
  const bottom = j.y + j.h/2 - 10;
  const top = bottom - 42;

  const grd = ctx.createLinearGradient(0, top, 0, bottom);
  grd.addColorStop(0, s.colors[1]);
  grd.addColorStop(0.36, s.colors[0]);
  grd.addColorStop(0.72, s.colors[2]);
  grd.addColorStop(1, "rgba(0,0,0,.55)");
  ctx.fillStyle = grd;

  ctx.beginPath();
  ctx.moveTo(left, bottom - 2);

  for(let i = 0; i <= 28; i++){
    const t = i / 28;
    const x = left + (right - left) * t;
    const curve = Math.sin(t * Math.PI) * 8;
    ctx.lineTo(x, bottom - curve);
  }

  for(let i = 28; i >= 0; i--){
    const t = i / 28;
    const x = left + (right - left) * t;
    const wobble = Math.sin(x * 0.035 + state.prestige) * 3 + Math.sin(x * .071) * 1.3;
    ctx.lineTo(x, top + wobble);
  }

  ctx.closePath();
  ctx.fill();

  // compressed darker base layer
  ctx.fillStyle = "rgba(0,0,0,.18)";
  ctx.beginPath();
  ctx.ellipse(j.x, bottom - 3, (right-left)/2, 8, 0, 0, Math.PI);
  ctx.fill();

  // grain field
  for(let i = 0; i < 140; i++){
    const t = ((i * 37) % 100) / 100;
    const x = left + (right - left) * t;
    const curve = Math.sin(t * Math.PI) * 8;
    const yMin = top + 7 + Math.sin(x * 0.035 + state.prestige) * 2;
    const yMax = bottom - curve - 2;
    const y = yMin + ((i * 19) % Math.max(4, yMax - yMin));
    ctx.fillStyle = s.specks[i % s.specks.length];
    ctx.globalAlpha = 0.26 + (i % 5) * 0.10;
    ctx.beginPath();
    ctx.arc(x, y, 0.8 + (i % 4) * 0.45, 0, Math.PI * 2);
    ctx.fill();
  }

  // sparse pebbles
  for(let i = 0; i < 22; i++){
    const t = ((i * 53) % 100) / 100;
    const x = left + (right - left) * t;
    const curve = Math.sin(t * Math.PI) * 8;
    const y = top + 15 + ((i * 29) % Math.max(5, bottom - curve - top - 20));
    const r = 1.5 + (i % 4) * .7;
    ctx.globalAlpha = .42;
    ctx.fillStyle = i % 3 === 0 ? s.colors[1] : (i % 3 === 1 ? s.colors[0] : s.colors[2]);
    ctx.beginPath();
    ctx.ellipse(x, y, r * 1.25, r, (i % 5) * .4, 0, Math.PI * 2);
    ctx.fill();
  }

  // detritus freckles
  for(let i = 0; i < 36; i++){
    const t = ((i * 71) % 100) / 100;
    const x = left + (right - left) * t;
    const y = top + 5 + ((i * 17) % 34);
    ctx.fillStyle = "rgba(18,12,8,.28)";
    ctx.globalAlpha = .45;
    ctx.fillRect(x, y, 1 + (i % 2), 1);
  }

  ctx.globalAlpha = 1;
}


function drawJar(){
  const j = jar();
  const left = j.x - j.w/2;
  const top = j.y - j.h/2;
  const right = j.x + j.w/2;
  const bottom = j.y + j.h/2;

  ctx.save();

  // Cork lid, drawn with simple rectangles/ellipses so mobile Safari doesn't throw a tantrum.
  const corkW = j.w * 0.76;
  const corkH = 28;
  const corkX = j.x - corkW/2;
  const corkY = top + 2;

  const corkGrad = ctx.createLinearGradient(0, corkY, 0, corkY + corkH);
  corkGrad.addColorStop(0, "#9b7146");
  corkGrad.addColorStop(0.55, "#6f4b2d");
  corkGrad.addColorStop(1, "#3f2a1a");
  ctx.fillStyle = corkGrad;
  ctx.fillRect(corkX + 8, corkY, corkW - 16, corkH);
  ctx.beginPath();
  ctx.ellipse(corkX + 8, corkY + corkH/2, 8, corkH/2, 0, Math.PI/2, Math.PI*1.5);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(corkX + corkW - 8, corkY + corkH/2, 8, corkH/2, 0, -Math.PI/2, Math.PI/2);
  ctx.fill();

  ctx.strokeStyle = "rgba(245,213,163,.35)";
  ctx.lineWidth = 2;
  ctx.strokeRect(corkX + 8, corkY + 2, corkW - 16, corkH - 4);

  for(let i = 0; i < 22; i++){
    const gx = corkX + 14 + ((i * 23) % Math.max(1, corkW - 28));
    const gy = corkY + 7 + ((i * 11) % Math.max(1, corkH - 12));
    ctx.fillStyle = i % 3 === 0 ? "rgba(40,24,12,.35)" : "rgba(230,180,120,.18)";
    ctx.beginPath();
    ctx.arc(gx, gy, 1 + (i % 2), 0, Math.PI * 2);
    ctx.fill();
  }

  // Jar body path
  function jarPath(){
    const shoulder = Math.min(42, j.w * 0.12);
    const r = Math.min(30, j.w * 0.08);
    ctx.beginPath();
    ctx.moveTo(left + shoulder, top + 34);
    ctx.quadraticCurveTo(left + 6, top + 34, left + 6, top + shoulder + 24);
    ctx.lineTo(left + 6, bottom - r);
    ctx.quadraticCurveTo(left + 6, bottom - 5, left + r + 4, bottom - 5);
    ctx.lineTo(right - r - 4, bottom - 5);
    ctx.quadraticCurveTo(right - 6, bottom - 5, right - 6, bottom - r);
    ctx.lineTo(right - 6, top + shoulder + 24);
    ctx.quadraticCurveTo(right - 6, top + 34, right - shoulder, top + 34);
    ctx.lineTo(left + shoulder, top + 34);
    ctx.closePath();
  }

  jarPath();

  const water = ctx.createLinearGradient(0, top, 0, bottom);
  water.addColorStop(0, "rgba(31,82,113,.22)");
  water.addColorStop(0.22, "rgba(18,61,91,.68)");
  water.addColorStop(1, "rgba(8,28,42,.88)");
  ctx.fillStyle = water;
  ctx.fill();

  const sideShade = ctx.createLinearGradient(left, 0, right, 0);
  sideShade.addColorStop(0, "rgba(0,0,0,.30)");
  sideShade.addColorStop(0.14, "rgba(255,255,255,.06)");
  sideShade.addColorStop(0.50, "rgba(255,255,255,.02)");
  sideShade.addColorStop(0.86, "rgba(255,255,255,.06)");
  sideShade.addColorStop(1, "rgba(0,0,0,.30)");
  ctx.fillStyle = sideShade;
  ctx.fill();

  // Waterline
  ctx.strokeStyle = "rgba(216,245,255,.34)";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.ellipse(j.x, top + 66, j.w/2 - 18, 5.5, 0, 0, Math.PI * 2);
  ctx.stroke();

  drawSubstrateLayer(j);

  // Glass outline
  ctx.strokeStyle = "rgba(157,211,255,.62)";
  ctx.lineWidth = 3;
  jarPath();
  ctx.stroke();

  // Side highlights
  ctx.strokeStyle = "rgba(255,255,255,.15)";
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(left + 24, top + 72);
  ctx.lineTo(left + 24, bottom - 42);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,.08)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(right - 22, top + 76);
  ctx.lineTo(right - 22, bottom - 46);
  ctx.stroke();

  // Front glass lip over cork
  ctx.strokeStyle = "rgba(215,245,255,.48)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.ellipse(j.x, top + 35, j.w/2 - 9, 13, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,.22)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(j.x, top + 28, j.w/2 - 15, 8, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Bubbles
  for(let i = 0; i < 7; i++){
    const t = performance.now() * 0.02;
    const bx = j.x + j.w * 0.28 + Math.sin(i * 1.4 + t / 26) * (8 + i);
    const by = bottom - 18 - ((t + i * 42) % Math.max(24, j.h - 92));
    const radius = 1.8 + ((i % 3) * 0.9);
    ctx.strokeStyle = `rgba(220,240,255,${0.26 + i * 0.035})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawLeaf(x, y, len, angle, color){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -len / 2, len * 0.16, len * 0.52, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function plantPhase(){
  let phase = 0;
  if(state.shrimp >= 2) phase = 1;
  if(state.shrimp >= 4) phase = 2;
  if(state.shrimp >= 6) phase = 3;
  if(state.shrimp >= 8) phase = 4;
  if(state.shrimp >= 12) phase = 5;
  if(state.shrimp >= 16) phase = 6;
  if(state.shrimp >= 22) phase = 7;
  if(state.shrimp >= 30) phase = 8;
  if(state.shrimp >= 42) phase = 9;
  if(state.shrimp >= 56) phase = 10;
  return phase;
}

const plantRoster = [
  {id:"bacopa", role:"mid"},
  {id:"hairgrass", role:"background"},
  {id:"javaFern", role:"large"},
  {id:"amazonSword", role:"large"},
  {id:"crypt", role:"mid"},
  {id:"javaMoss", role:"low"},
  {id:"ludwigia", role:"accent"},
  {id:"rotala", role:"accent"},
  {id:"purpleVelvet", role:"accent"}
];

function seededRand(seed){
  const x = Math.sin(seed * 12.9898) * 43758.5453;
  return x - Math.floor(x);
}

function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function shuffleWithSeed(arr, seed){
  const rng = mulberry32(seed || 1);
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPlantPool(){
  if(!state.plantSeed) state.plantSeed = Math.floor(Math.random() * 999999999);

  const basePool = [
    "bacopa",
    "crypt",
    "javaFern",
    "amazonSword",
    "javaMoss",
    "ludwigia",
    "rotala",
    "hairgrass",
    "anubias"
  ];

  const rng = mulberry32(state.plantSeed + 707);
  let pool = shuffleWithSeed(basePool, state.plantSeed);

  // 11% velvet bacopa chance per run/prestige. Rare, not invisible. Revolutionary restraint.
  if(rng() < 0.11){
    pool.splice(Math.min(3, pool.length), 0, "purpleVelvet");
    state.velvetSeen = true;
  }

  // Make sure the first plant is not always grass. Grass can still happen, but not as a cursed default.
  if(pool[0] === "hairgrass"){
    const swapIndex = pool.findIndex(p => p !== "hairgrass");
    if(swapIndex > 0){
      [pool[0], pool[swapIndex]] = [pool[swapIndex], pool[0]];
    }
  }

  state.plantPool = pool;
}

function choosePlantType(slot){
  if(!Array.isArray(state.plantPool) || state.plantPool.length === 0){
    buildPlantPool();
  }
  return state.plantPool[slot % state.plantPool.length];
}

function plantRoleForType(type, fallback){
  if(type === "hairgrass") return "background";
  if(type === "amazonSword" || type === "javaFern") return "large";
  if(type === "javaMoss") return "low";
  if(type === "ludwigia" || type === "rotala" || type === "purpleVelvet") return "accent";
  return fallback || "mid";
}

function ensurePlantSlots(){
  const phase = plantPhase();
  if(!Array.isArray(state.plantSlots)) state.plantSlots = [];
  if(!Array.isArray(state.plantPool) || state.plantPool.length === 0) buildPlantPool();

  const j = jar();
  const left = j.x - j.w/2 + 44;
  const right = j.x + j.w/2 - 44;
  const target = phase <= 0 ? 0 : Math.min(10, phase);

  while(state.plantSlots.length < target){
    const i = state.plantSlots.length;
    const seedBase = state.plantSeed + i * 997 + state.prestige * 43;
    const type = choosePlantType(i);
    const role = plantRoleForType(type, ["mid","large","low","accent","background"][i % 5]);
    const jitter = (seededRand(seedBase + 21) - 0.5) * 0.11;
    const t = Math.min(.96, Math.max(.04, ((i + .55) / 10) + jitter));
    const x = left + (right - left) * t;

    state.plantSlots.push({
      id: "p" + state.prestige + "_" + i,
      type,
      role,
      xRatio: (x - left) / Math.max(1, right - left),
      lean: ((seededRand(seedBase + 44) - .5) * 18),
      heightSeed: seededRand(seedBase + 83),
      colorSeed: seededRand(seedBase + 31),
      rooted: seededRand(seedBase + 909) < 0.08
    });
    if(state.plantSlots[state.plantSlots.length - 1].rooted) state.rootedSeen = true;
  }
}


function plantStage(slotIndex){
  const phase = plantPhase();
  if(phase <= slotIndex) return 0;
  const extra = phase - slotIndex;
  if(extra >= 7) return 3;
  if(extra >= 4) return 2;
  if(extra >= 1) return 1;
  return 0;
}

function drawTinyLeaf(x, y, w, h, angle, color){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHairgrass(x, baseY, h, lean, stage){
  const blades = 5 + stage * 4;
  for(let b = 0; b < blades; b++){
    const ox = (b - blades/2) * 3.2;
    const bh = h * (.65 + (b % 5) * .10);
    const l = lean * .25 + (b - blades/2) * 1.4;
    ctx.strokeStyle = b % 2 ? "#59d07a" : "#2fae5f";
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(x + ox, baseY);
    ctx.quadraticCurveTo(x + ox + l * .4, baseY - bh * .55, x + ox + l, baseY - bh);
    ctx.stroke();
  }
}

function drawBacopa(x, baseY, h, lean, stage){
  const stems = 1 + stage;
  for(let s = 0; s < stems; s++){
    const ox = (s - stems/2) * 6;
    ctx.strokeStyle = "#247840";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(x + ox, baseY);
    ctx.quadraticCurveTo(x + ox + lean * .3, baseY - h * .5, x + ox + lean, baseY - h);
    ctx.stroke();
    const leaves = 4 + stage * 2;
    for(let k = 0; k < leaves; k++){
      const t = (k + 1) / (leaves + 1);
      const px = x + ox + lean * t;
      const py = baseY - h * t;
      drawTinyLeaf(px - 4, py, 3.2, 4.2, -.6, "#65d97a");
      drawTinyLeaf(px + 4, py + 1, 3.2, 4.2, .6, "#78e08f");
    }
  }
}

function drawJavaFern(x, baseY, h, lean, stage){
  const leaves = 3 + stage * 2;
  for(let k = 0; k < leaves; k++){
    const side = k - leaves/2;
    const lh = h * (.72 + (k % 3) * .08);
    ctx.strokeStyle = "#1e6b39";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.quadraticCurveTo(x + side * 8 + lean * .2, baseY - lh * .45, x + side * 12 + lean, baseY - lh);
    ctx.stroke();
    drawTinyLeaf(x + side * 8 + lean * .35, baseY - lh * .52, 4, 14, side * .12, "#3faa5e");
    if(stage >= 2) drawTinyLeaf(x + side * 11 + lean * .55, baseY - lh * .74, 3.5, 11, side * .12, "#59c875");
  }
}

function drawAmazonSword(x, baseY, h, lean, stage){
  const leaves = 4 + stage * 3;
  for(let k = 0; k < leaves; k++){
    const angle = (k - leaves/2) * .18;
    const lh = h * (.82 + (k % 4) * .06);
    const px = x + Math.sin(angle) * 12 + lean * .25;
    const py = baseY - lh * .52;
    ctx.strokeStyle = "#1f6c38";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.lineTo(px, py);
    ctx.stroke();
    drawTinyLeaf(px, py - lh * .18, 5.5, 18 + stage * 2, angle, k % 2 ? "#57c56c" : "#6bd47b");
  }
}

function drawCrypt(x, baseY, h, lean, stage){
  const leaves = 5 + stage * 3;
  for(let k = 0; k < leaves; k++){
    const side = (k - leaves/2);
    const color = k % 2 ? "#4fa85e" : "#367b46";
    drawTinyLeaf(x + side * 4 + lean * .2, baseY - 9 - (k % 3) * 3, 5, 12 + stage * 2, side * .12, color);
  }
}

function drawJavaMoss(x, baseY, h, lean, stage){
  const clumps = 12 + stage * 8;
  for(let i = 0; i < clumps; i++){
    const ox = ((i * 7) % (26 + stage * 6)) - (13 + stage * 3);
    const oy = -((i * 11) % (14 + stage * 7));
    ctx.fillStyle = i % 3 ? "#3db963" : "#257d44";
    ctx.globalAlpha = .76;
    ctx.beginPath();
    ctx.arc(x + ox, baseY + oy, 2 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLudwigia(x, baseY, h, lean, stage){
  ctx.strokeStyle = "#6d1f2a";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + lean * .35, baseY - h * .5, x + lean, baseY - h);
  ctx.stroke();
  const leaves = 5 + stage * 2;
  for(let k = 0; k < leaves; k++){
    const t = (k + 1) / (leaves + 1);
    const side = k % 2 ? 1 : -1;
    drawTinyLeaf(x + lean * t + side * 5, baseY - h * t, 3, 8, side * .55, k % 2 ? "#bb3d4b" : "#d2575f");
  }
}

function drawRotala(x, baseY, h, lean, stage){
  const stems = 2 + stage;
  for(let s = 0; s < stems; s++){
    const ox = (s - stems/2) * 5;
    ctx.strokeStyle = "#7d3c51";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x + ox, baseY);
    ctx.quadraticCurveTo(x + ox + lean * .25, baseY - h * .5, x + ox + lean, baseY - h);
    ctx.stroke();
    for(let k = 0; k < 5 + stage; k++){
      const t = (k + 1) / (6 + stage);
      drawTinyLeaf(x + ox + lean * t + (k%2?-3:3), baseY - h * t, 2.5, 5.5, k%2?.5:-.5, k % 2 ? "#e1848c" : "#c76575");
    }
  }
}

function drawPurpleVelvet(x, baseY, h, lean, stage){
  ctx.strokeStyle = "#5b2a6e";
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + lean * .35, baseY - h * .5, x + lean, baseY - h);
  ctx.stroke();
  const leaves = 5 + stage * 2;
  for(let k = 0; k < leaves; k++){
    const t = (k + 1) / (leaves + 1);
    const side = k % 2 ? 1 : -1;
    drawTinyLeaf(x + lean * t + side * 5, baseY - h * t, 3.8, 8.5, side * .55, k % 2 ? "#8b5bb5" : "#6d3b8c");
  }
}

function drawPlants(){
  ensurePlantSlots();

  const j = jar();
  const baseY = j.y + j.h/2 - 43;
  const left = j.x - j.w/2 + 44;
  const right = j.x + j.w/2 - 44;

  for(let i = 0; i < state.plantSlots.length; i++){
    const pl = state.plantSlots[i];
    const stage = plantStage(i);
    if(stage <= 0) continue;

    const x = left + pl.xRatio * (right - left);
    const baseHeight = pl.role === "large" ? 52 : pl.role === "background" ? 58 : pl.role === "low" ? 22 : 38;
    const h = baseHeight + stage * (pl.role === "large" ? 17 : pl.role === "background" ? 14 : pl.role === "low" ? 7 : 11) + pl.heightSeed * 12;
    const lean = pl.rooted ? 0 : pl.lean;

    if(pl.type === "hairgrass") drawHairgrass(x, baseY, h, lean, stage);
    else if(pl.type === "bacopa") drawBacopa(x, baseY, h, lean, stage);
    else if(pl.type === "javaFern") drawJavaFern(x, baseY, h, lean, stage);
    else if(pl.type === "amazonSword") drawAmazonSword(x, baseY, h, lean, stage);
    else if(pl.type === "crypt") drawCrypt(x, baseY, h, lean, stage);
    else if(pl.type === "javaMoss") drawJavaMoss(x, baseY, h, lean, stage);
    else if(pl.type === "ludwigia") drawLudwigia(x, baseY, h, lean, stage);
    else if(pl.type === "rotala") drawRotala(x, baseY, h, lean, stage);
    else if(pl.type === "purpleVelvet") drawPurpleVelvet(x, baseY, h, lean, stage);
  }
}


function mythicalAlpha(i){
  return 0.24 + Math.sin(performance.now() * 0.002 + i * 1.7) * 0.08;
}

function shellPalette(i, mythical){
  if(mythical){
    return ["#b9e9ff", "#fff3d7", "#8f6bc7"];
  }
  const palettes = [
    ["#b99055", "#e6d2a0", "#6d4a2a"],
    ["#d8c7a2", "#fff1c9", "#8a795f"],
    ["#8e6b4f", "#cba27a", "#4f3427"],
    ["#c97b42", "#f0bd77", "#7b3f25"],
    ["#9a8f7d", "#e4dccb", "#5d564b"]
  ];
  return palettes[i % palettes.length];
}

function drawShellGlow(x, y, s, i){
  const a = mythicalAlpha(i);
  const g = ctx.createRadialGradient(x, y, 1, x, y, 18 * s);
  g.addColorStop(0, `rgba(215,235,255,${a})`);
  g.addColorStop(.45, `rgba(180,130,255,${a * .42})`);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, 18 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawSpiralShell(x, y, s, rot, base, light, dark, mythical, i){
  if(mythical) drawShellGlow(x, y, s, i);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.arc(0, 0, 6.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth = 1.1;
  ctx.beginPath();
  ctx.arc(0, 0, 5.8, .2, Math.PI * 1.85);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 3.3, .4, Math.PI * 1.75);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 1.4, .2, Math.PI * 1.8);
  ctx.stroke();
  ctx.fillStyle = light;
  ctx.globalAlpha = mythical ? .78 : .55;
  ctx.fillRect(-3, -5, 4, 1);
  if(mythical) ctx.fillRect(1, -3, 2, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawClamShell(x, y, s, rot, base, light, dark, mythical, i){
  if(mythical) drawShellGlow(x, y, s, i);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.moveTo(-8, 2);
  ctx.quadraticCurveTo(-5, -6, 0, -7);
  ctx.quadraticCurveTo(6, -6, 9, 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth = 1;
  for(let r = -3; r <= 3; r++){
    ctx.beginPath();
    ctx.moveTo(0, 1);
    ctx.lineTo(r * 2.2, -5 + Math.abs(r));
    ctx.stroke();
  }
  ctx.fillStyle = light;
  ctx.globalAlpha = mythical ? .78 : .5;
  ctx.fillRect(-4, -5, 8, 1);
  if(mythical) ctx.fillRect(-1, -7, 2, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBrokenShell(x, y, s, rot, base, light, dark, mythical, i){
  if(mythical) drawShellGlow(x, y, s, i);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.moveTo(-8, 2);
  ctx.lineTo(-3, -5);
  ctx.lineTo(3, -3);
  ctx.lineTo(7, 2);
  ctx.lineTo(2, 4);
  ctx.lineTo(-5, 4);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, 2);
  ctx.lineTo(2, -2);
  ctx.lineTo(5, 1);
  ctx.stroke();
  ctx.fillStyle = light;
  ctx.globalAlpha = mythical ? .72 : .45;
  ctx.fillRect(-2, -3, 4, 1);
  if(mythical) ctx.fillRect(2, 1, 2, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawConeShell(x, y, s, rot, base, light, dark, mythical, i){
  if(mythical) drawShellGlow(x, y, s, i);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.moveTo(-8, 3);
  ctx.lineTo(9, 0);
  ctx.lineTo(-5, -5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth = 1;
  for(let r = -5; r < 7; r += 3){
    ctx.beginPath();
    ctx.moveTo(r, 2);
    ctx.lineTo(r + 2, -3);
    ctx.stroke();
  }
  ctx.fillStyle = light;
  ctx.globalAlpha = mythical ? .75 : .45;
  ctx.fillRect(-5, -3, 6, 1);
  if(mythical) ctx.fillRect(2, -1, 2, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawShells(){
  const j = jar();
  const left = j.x - j.w/2 + 40;
  const right = j.x + j.w/2 - 40;
  const baseY = j.y + j.h/2 - 38;
  const n = Math.min(state.shells, 28);
  const maxMythical = 3;
  let mythicalCount = 0;

  for(let i = 0; i < n; i++){
    const row = Math.floor(i / 10);
    const col = i % 10;
    const spread = right - left;
    const x = left + ((col + .35 * row) / 9) * spread + Math.sin(i * 4.71) * 5;
    const y = baseY - row * 7 + (i % 3) * 2;
    const scale = .82 + ((i * 13) % 7) * .055;
    const rot = ((i * 19) % 17 - 8) * .045;
    const mythical = ((i * 17 + state.prestige * 13) % 11 === 0) && mythicalCount < maxMythical;
    if(mythical){ mythicalCount++; state.mythicalSeen = true; }

    const pal = shellPalette(i, mythical);
    const type = i % 4;

    if(type === 0) drawSpiralShell(x, y, scale, rot, pal[0], pal[1], pal[2], mythical, i);
    if(type === 1) drawClamShell(x, y, scale, rot, pal[0], pal[1], pal[2], mythical, i);
    if(type === 2) drawBrokenShell(x, y, scale, rot, pal[0], pal[1], pal[2], mythical, i);
    if(type === 3) drawConeShell(x, y, scale, rot, pal[0], pal[1], pal[2], mythical, i);

    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(x - 7 * scale, y + 3 * scale, 14 * scale, 2);

    if(mythical && Math.sin(performance.now() * .004 + i) > .82){
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillRect(x + 8 * scale, y - 7 * scale, 1.4, 1.4);
    }
  }
}


function hexToRgb(hex){
  if(typeof hex !== "string"){
    return {r:255, g:255, b:255};
  }

  const rgbMatch = hex.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
  if(rgbMatch){
    return {
      r:parseInt(rgbMatch[1], 10),
      g:parseInt(rgbMatch[2], 10),
      b:parseInt(rgbMatch[3], 10)
    };
  }

  hex = hex.replace("#", "").trim();
  if(hex.length === 3){
    hex = hex.split("").map(c => c + c).join("");
  }

  const num = parseInt(hex, 16);
  if(Number.isNaN(num)){
    return {r:255, g:255, b:255};
  }

  return {
    r:(num >> 16) & 255,
    g:(num >> 8) & 255,
    b:num & 255
  };
}

function colorToRgb(color){
  return hexToRgb(color);
}

function darken(hex, amount){
  const {r,g,b} = colorToRgb(hex);
  return `rgb(${Math.round(r*(1-amount))},${Math.round(g*(1-amount))},${Math.round(b*(1-amount))})`;
}

function lighten(hex, amount){
  const {r, g, b} = colorToRgb(hex);
  const nr = Math.round(r + (255 - r) * amount);
  const ng = Math.round(g + (255 - g) * amount);
  const nb = Math.round(b + (255 - b) * amount);
  return `rgb(${nr},${ng},${nb})`;
}

function pixelColorToRgb(color){
  if(typeof color !== "string") return {r:230,g:72,b:29};

  const rgbMatch = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
  if(rgbMatch){
    return {
      r:parseInt(rgbMatch[1],10),
      g:parseInt(rgbMatch[2],10),
      b:parseInt(rgbMatch[3],10)
    };
  }

  let hex = color.replace("#","").trim();
  if(hex.length === 3){
    hex = hex.split("").map(c => c + c).join("");
  }

  const num = parseInt(hex,16);
  if(Number.isNaN(num)) return {r:230,g:72,b:29};

  return {
    r:(num >> 16) & 255,
    g:(num >> 8) & 255,
    b:num & 255
  };
}

function pixelShade(color, percent){
  const {r,g,b} = pixelColorToRgb(color);
  const factor = 1 + percent / 100;
  return `rgb(${Math.max(0,Math.min(255,Math.round(r*factor)))},${Math.max(0,Math.min(255,Math.round(g*factor)))},${Math.max(0,Math.min(255,Math.round(b*factor)))})`;
}

function drawPixelBlock(x,y,w,h,c){
  ctx.fillStyle = c;
  ctx.fillRect(x,y,w,h);
}

function shrimpPalette(s){
  const rawIndex = s && typeof s.variantIndex === "number" ? s.variantIndex : currentVariantIndex();
  const idx = ((rawIndex % shrimpVariants.length) + shrimpVariants.length) % shrimpVariants.length;
  const variant = shrimpVariants[idx] || shrimpVariants[0];

  let baseColor = variant.color || "#d62828";
  let accentColor = variant.accent || lighten(baseColor, 0.85);

  if(s && s.mutant){
    baseColor = lighten(baseColor, 0.45);
    accentColor = lighten(accentColor, 0.2);
  }

  return {
    base: baseColor,
    accent: accentColor,
    pattern: variant.pattern || null
  };
}

function drawPixels(pixels, ox, oy, color){
  ctx.fillStyle = color;
  for(const [px, py] of pixels){
    ctx.fillRect(ox + px, oy + py, 1, 1);
  }
}

function drawShrimp(s, t){
  if(!s) return;

  const x = Math.round(Number.isFinite(s.x) ? s.x : 0);
  const y = Math.round((Number.isFinite(s.y) ? s.y : 0) + Math.sin(s.bob || 0) * 2);
  const dir = s.vx >= 0 ? 1 : -1;
  const scale = (s.scale || 1) * 0.65;

  const pal = shrimpPalette(s) || {base:"#e5481d", accent:"#ffc39c", pattern:null};
  const base = pal.base || "#e5481d";

  const palette = {
    dark: pixelShade(base, -38),
    mid: base,
    orange: pixelShade(base, 12),
    light: pixelShade(base, 42),
    pale: pal.accent || pixelShade(base, 72),
    eye: "#050505"
  };

  function p(x,y,w,h,c){
    drawPixelBlock(x,y,w,h,c);
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir * scale, scale);

  // antennae
  p(-18,-6,1,1,palette.orange);
  p(-17,-8,1,1,palette.orange);
  p(-16,-10,1,1,palette.orange);
  p(-15,-11,1,2,palette.orange);

  p(-18,-3,1,1,palette.orange);
  p(-16,-3,1,1,palette.orange);
  p(-14,-2,1,1,palette.orange);

  // rostrum / nose
  p(-16,-5,4,2,palette.mid);
  p(-14,-4,6,2,palette.orange);
  p(-12,-3,7,3,palette.orange);
  p(-10,0,5,2,palette.mid);

  // head
  p(-8,-7,8,2,palette.orange);
  p(-10,-5,13,3,palette.orange);
  p(-9,-2,14,4,palette.mid);
  p(-7,2,11,3,palette.dark);

  // clean curved full-color back, final accepted branch
  p(0,-8,7,2,palette.orange);
  p(6,-9,8,2,palette.orange);
  p(13,-8,8,2,palette.orange);
  p(20,-7,5,2,palette.mid);

  // fill line from accepted v6/v7 branch
  p(6,-7,8,2,palette.orange);

  // body middle
  p(2,-5,25,4,palette.light);
  p(5,-1,26,4,palette.orange);
  p(6,3,23,3,palette.mid);
  p(10,6,16,3,palette.dark);

  // abdomen curve
  p(27,-5,8,4,palette.orange);
  p(31,-2,8,4,palette.mid);
  p(34,2,7,5,palette.orange);
  p(35,7,6,5,palette.mid);
  p(33,12,6,5,palette.orange);
  p(29,17,7,5,palette.dark);
  p(25,21,7,4,palette.mid);

  // compact tail fan
  p(37,5,5,3,palette.orange);
  p(41,4,3,2,palette.mid);
  p(41,8,3,2,palette.light);
  p(37,11,4,2,palette.dark);
  p(40,6,2,4,palette.mid);

  // highlights, restrained
  p(4,-7,6,1,palette.pale);
  p(11,-7,5,1,palette.light);
  p(20,-5,4,1,palette.pale);
  p(34,4,3,1,palette.pale);
  p(32,15,3,1,palette.light);

  // segment shading softened
  p(4,3,2,5,palette.mid);
  p(12,2,2,6,palette.mid);
  p(20,1,2,6,palette.mid);
  p(28,0,2,6,palette.mid);
  p(34,6,2,5,palette.mid);

  // rili / crystal pattern support
  if(pal.pattern === "rili"){
    p(8,-5,8,3,palette.pale);
    p(8,-2,9,4,palette.pale);
    p(10,2,6,3,palette.pale);
  }

  // short tucked legs
  p(-4,5,1,4,palette.orange);
  p(-3,8,1,2,palette.mid);

  p(3,6,1,4,palette.orange);
  p(4,9,1,2,palette.mid);

  p(10,7,1,4,palette.orange);
  p(11,10,1,2,palette.mid);

  p(17,7,1,4,palette.orange);
  p(18,10,1,2,palette.mid);

  p(24,7,1,3,palette.orange);
  p(25,9,1,2,palette.mid);

  // lower shadow pixels
  p(-6,3,8,2,"rgba(0,0,0,.20)");
  p(6,8,16,2,"rgba(0,0,0,.20)");
  p(27,23,5,2,"rgba(0,0,0,.20)");

  // eye
  p(-7,-4,3,4,palette.eye);
  p(-6,-4,1,1,"#ffffff");

  ctx.restore();

  if(s.mutant){
    const sparkle = (Math.sin(t / 220 + (s.bob || 0) * 10) + 1) / 2;
    if(sparkle > 0.82){
      ctx.fillStyle = "#fff8ff";
      ctx.fillRect(x - 5, y - 5, 1, 1);
      ctx.fillRect(x + 6, y - 1, 1, 1);
      ctx.fillRect(x, y + 5, 1, 1);
    }
  }
}

function updateShrimp(){
  if(state.activeEventType === "gap") return;
  const j = jar();

  // Pixel shrimp sprite footprint after scale. Extra padding keeps the whole body inside glass.
  const spritePadX = 34;
  const spritePadY = 18;

  const left = j.x - j.w/2 + 16 + spritePadX;
  const right = j.x + j.w/2 - 16 - spritePadX;
  const top = j.y - j.h/2 + 46 + spritePadY;
  const bottom = j.y + j.h/2 - 38 - spritePadY;

  for(const s of state.list){
    if(s.watchUntil && performance.now() < s.watchUntil){
      s.bob += 0.005;
      continue;
    }
    if(Math.random() < 0.008) s.vx += (Math.random() - 0.5) * 0.25;
    if(Math.random() < 0.008) s.vy += (Math.random() - 0.5) * 0.12;

    s.vx = Math.max(-0.8, Math.min(0.8, s.vx));
    s.vy = Math.max(-0.35, Math.min(0.35, s.vy));

    s.x += s.vx;
    s.y += s.vy;
    s.bob += 0.08;

    s.x += (j.x - s.x) * 0.0008;
    s.y += (j.y + 42 - s.y) * 0.0006;

    if(s.x < left){
      s.x = left;
      s.vx = Math.abs(s.vx);
    }
    if(s.x > right){
      s.x = right;
      s.vx = -Math.abs(s.vx);
    }
    if(s.y < top){
      s.y = top;
      s.vy = Math.abs(s.vy);
    }
    if(s.y > bottom){
      s.y = bottom;
      s.vy = -Math.abs(s.vy);
    }
  }
}


function drawOscarShadow(){
  if(state.activeEventType !== "oscar") return;

  const elapsed = performance.now() - (state.oscarStart || performance.now());
  const duration = 7000;
  const rawT = Math.min(1, Math.max(0, elapsed / duration));
  const ease = rawT * rawT * (3 - 2 * rawT);
  const j = jar();

  const startX = j.x + j.w * 1.18;
  const endX = j.x - j.w * 1.18;
  const x = startX + (endX - startX) * ease;
  const y = j.y - j.h * .08 + Math.sin(rawT * Math.PI) * 18;
  const alpha = Math.sin(rawT * Math.PI) * .46;

  // Tank dim first, so it feels like light is being blocked.
  ctx.fillStyle = `rgba(0,0,0,${alpha * .34})`;
  ctx.fillRect(j.x - j.w/2 + 7, j.y - j.h/2 + 36, j.w - 14, j.h - 42);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.scale(2.25, .76);
  ctx.fillStyle = "rgba(0,0,0,0.96)";

  // Single continuous Oscar-like silhouette.
  // No overlapping blobs, no catfish cosplay, no shadow lasagna.
  ctx.beginPath();

  // blunt head / nose
  ctx.moveTo(-76, 0);

  // upper head into back
  ctx.bezierCurveTo(-70, -24, -46, -38, -16, -42);
  ctx.bezierCurveTo(10, -48, 42, -42, 72, -23);

  // dorsal soft ridge integrated into same fill
  ctx.bezierCurveTo(45, -38, 22, -52, 0, -43);

  // reconnect along upper body
  ctx.bezierCurveTo(34, -43, 66, -30, 88, -12);

  // rounded fan tail
  ctx.bezierCurveTo(113, -34, 132, -25, 126, 0);
  ctx.bezierCurveTo(132, 25, 113, 34, 88, 12);

  // lower body
  ctx.bezierCurveTo(62, 34, 24, 46, -14, 42);

  // lower fin / belly mass integrated into path
  ctx.bezierCurveTo(12, 55, 38, 45, 52, 26);

  // return to head/belly
  ctx.bezierCurveTo(18, 42, -48, 34, -76, 0);

  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // Soft trailing darkness.
  ctx.fillStyle = `rgba(0,0,0,${alpha * .10})`;
  ctx.fillRect(j.x - j.w/2 + 7, j.y - j.h/2 + 36, j.w - 14, j.h - 42);
}


function drawCohesionOverlay(){
  const usableHeight = canvasHeight();
  const j = jar();

  // subtle water depth and center glow, kept HTML/canvas friendly. No Pixar crimes.
  const depth = ctx.createLinearGradient(0, j.y - j.h/2, 0, j.y + j.h/2);
  depth.addColorStop(0, "rgba(120,210,255,.045)");
  depth.addColorStop(.52, "rgba(30,90,130,.025)");
  depth.addColorStop(1, "rgba(0,0,0,.14)");
  ctx.fillStyle = depth;
  ctx.fillRect(j.x - j.w/2 + 8, j.y - j.h/2 + 38, j.w - 16, j.h - 44);

  const glow = ctx.createRadialGradient(j.x, j.y - j.h*.22, 10, j.x, j.y, j.w*.62);
  glow.addColorStop(0, "rgba(130,210,235,.07)");
  glow.addColorStop(.55, "rgba(80,150,180,.035)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(j.x - j.w/2, j.y - j.h/2, j.w, j.h);

  // light rays
  ctx.save();
  ctx.globalAlpha = .12;
  for(let i = 0; i < 5; i++){
    const x = j.x - j.w*.25 + i * j.w*.13;
    const ray = ctx.createLinearGradient(x, j.y - j.h/2 + 55, x + 30, j.y + j.h/2);
    ray.addColorStop(0, "rgba(190,240,255,.16)");
    ray.addColorStop(1, "rgba(190,240,255,0)");
    ctx.fillStyle = ray;
    ctx.beginPath();
    ctx.moveTo(x, j.y - j.h/2 + 52);
    ctx.lineTo(x + 18, j.y - j.h/2 + 52);
    ctx.lineTo(x + 70, j.y + j.h/2 - 30);
    ctx.lineTo(x + 25, j.y + j.h/2 - 30);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // vignette
  const vignette = ctx.createRadialGradient(window.innerWidth/2, usableHeight*.45, usableHeight*.16, window.innerWidth/2, usableHeight*.45, usableHeight*.72);
  vignette.addColorStop(0, "rgba(0,0,0,0)");
  vignette.addColorStop(1, "rgba(0,0,0,.16)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0,0,window.innerWidth,usableHeight);
}

function drawEventOverlay(){
  if(state.activeEventType === "gap"){
    const j = jar();
    ctx.fillStyle = "rgba(205,230,255,.035)";
    ctx.fillRect(j.x - j.w/2 + 8, j.y - j.h/2 + 38, j.w - 16, j.h - 44);
  }
}

function drawDayNightOverlay(){
  const usableHeight = canvasHeight();
  const hour = new Date().getHours();
  let overlay = null;

  if(hour >= 18 && hour < 20){
    overlay = "rgba(255,140,80,0.08)";
  } else if(hour >= 20 || hour < 6){
    overlay = "rgba(35,50,115,0.14)";
  }

  if(overlay){
    ctx.fillStyle = overlay;
    ctx.fillRect(0, 0, window.innerWidth, usableHeight);
  }
}

function drawFlash(){
  if(state.flash > 0){
    const usableHeight = canvasHeight();
    ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.22})`;
    ctx.fillRect(0, 0, window.innerWidth, usableHeight);
    state.flash -= 0.03;
  }
  if(state.prestigePulse > 0){
    state.prestigePulse = Math.max(0, state.prestigePulse - 0.05);
  }
}

function updateUI(t){
  titleEl.style.color = currentTitleColor(t);

  const pulseScale = 1 + state.prestigePulse * 0.08;
  titleEl.style.transform = `scale(${pulseScale})`;

  coinsEl.innerText = formatNumber(state.coins);
  shrimpEl.innerText = formatNumber(state.shrimp);
  shellsEl.innerText = state.shells;
  totalShrimpEl.innerText = formatNumber(state.totalShrimpEver);
  shrimpTypeEl.innerText = currentShrimpType();

  const oneCost = shrimpCost();
  const tenCost = totalCostForNextShrimp(10);
  const maxCount = getCachedBuyMaxCount();

  buyBtn.innerText = `Buy shrimp (${formatNumber(oneCost)})`;
  buy10Btn.innerText = `Buy 10 (${formatNumber(tenCost)})`;
  buyMaxBtn.innerText = `Buy max (${maxCount})`;
  prestigeBtn.innerText = `Prestige (${formatNumber(prestigeCost())})`;

  buyBtn.disabled = state.coins < oneCost;
  buy10Btn.disabled = state.coins < tenCost;
  buyMaxBtn.disabled = maxCount <= 0;
  prestigeBtn.disabled = state.coins < prestigeCost();
}


function tryEvents(t){
  const now = Date.now();

  if(state.eventActive){
    if(now >= state.eventEndsAt){
      state.eventActive = false;
      state.activeEventType = null;
      state.eventEndsAt = 0;
    }
    return;
  }

  // Active-session only. Offline doesn't get to have mystical shrimp moments. Ridiculous sentence.
  if(now - state.lastClickTime > 30000 && !state.stillnessSeen){
    state.eventActive = true;
    state.activeEventType = "stillness";
    state.eventEndsAt = now + 2200;
    state.stillnessSeen = true;
    showStatus("Still Water: Not everything needs to be touched.", 4200, 0);
    return;
  }

  // Watcher: only while player has stopped interacting for a short beat.
  const idleForWatcher = now - state.lastClickTime > 7000;

  if(now - state.lastEventTime < 45000) return;
  state.lastEventTime = now;

  const r = Math.random();

  // The Gap (1%): 5 seconds of visual movement pause.
  if(r < 0.01){
    state.eventActive = true;
    state.activeEventType = "gap";
    state.eventEndsAt = now + 5000;
    state.gapSeen = true;
    showStatus("The Gap: …was that real?", 4200, 0);
    return;
  }

  // Oscar shadow (3%): visual silhouette pass.
  if(r < 0.04){
    state.eventActive = true;
    state.activeEventType = "oscar";
    state.oscarStart = performance.now();
    state.eventEndsAt = now + 4200;
    state.oscarSeen = true;
    showStatus("Something Larger: You are not alone.", 4300, 0);
    return;
  }

  // Watcher (5%): one shrimp pauses. Message is the moment.
  if(idleForWatcher && r < 0.09 && state.list.length > 0){
    state.eventActive = true;
    state.activeEventType = "watcher";
    state.eventEndsAt = now + 2600;
    state.watcherSeen = true;
    const s = state.list[Math.floor(Math.random() * state.list.length)];
    if(s){
      s.watchUntil = performance.now() + 2400;
    }
    showStatus("The Watcher: Does it… know?", 3600, 0);
    return;
  }
}


function loop(t){
  if(!state.lastFrameTime) state.lastFrameTime = t;

  const dtMs = Math.min(100, t - state.lastFrameTime);
  state.lastFrameTime = t;
  const dtSec = dtMs / 1000;

  state.coins += incomePerSecond() * dtSec;

  passiveBreed(dtSec);
  updateShrimp();
  tryEvents(t);
  unlockAchievements();
  checkMilestones();
  renderAchievements();

  drawBackground();
  drawJar();
  drawPlants();
  drawShells();

  for(const s of state.list){
    try{
      drawShrimp(s, t);
    } catch(err){
      console.error("Shrimp draw failed:", err);
    }
  }

  drawOscarShadow();

  drawFlash();
  drawCohesionOverlay();
  drawEventOverlay();
  drawDayNightOverlay();
  updateUI(t);
  updateStatusText(t);

  state.saveTimer += dtMs;
  if(state.saveTimer >= 5000){
    state.saveTimer = 0;
    saveGame();
  }

  syncShrimp();

  requestAnimationFrame(loop);
}

applyOfflineProgress();
unlockAchievements();
checkMilestones();
syncShrimp();
renderAchievements();
invalidateBuyMaxCache();

window.addEventListener("beforeunload", saveGame);
document.addEventListener("visibilitychange", () => {
  if(document.hidden) saveGame();
});

syncShrimp();

requestAnimationFrame(loop);
</script>
