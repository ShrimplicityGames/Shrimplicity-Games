<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shrimp Idle</title>
<style>
  :root{
    --bg:#081420;
    --panel:#0d1c2c;
    --line:#1f3d5c;
    --text:#eef6ff;
    --blue:#2e6cff;
    --blue2:#4c84ff;
    --blue3:#6a9bff;
    --purple:#7e49ff;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui, Arial, sans-serif;
    overflow:hidden;
  }

  #topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    min-height:38px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    font-size:14px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    z-index:5;
    padding:8px 10px;
    flex-wrap:wrap;
  }

  #topbar span{
    white-space:nowrap;
  }

  #gameTitle{
    position:fixed;
    top:46px;
    left:0;
    right:0;
    text-align:center;
    font-size:18px;
    font-weight:700;
    letter-spacing:.35px;
    pointer-events:none;
    z-index:5;
    transition:color .25s linear;
    text-shadow:0 0 12px rgba(255,255,255,.06);
  }

  #studioTag{
    font-size:11px;
    opacity:.55;
    letter-spacing:.4px;
    margin-top:2px;
  }

  #statusText{
    position:fixed;
    top:92px;
    left:50%;
    transform:translateX(-50%);
    max-width:min(88vw, 720px);
    text-align:center;
    font-size:14px;
    color:rgba(238,246,255,.82);
    text-shadow:0 2px 10px rgba(0,0,0,.35);
    z-index:5;
    pointer-events:none;
    opacity:0;
    transition:opacity .7s ease;
    padding:0 12px;
    line-height:1.35;
  }

  #achBtn{
    position:fixed;
    right:10px;
    top:8px;
    cursor:pointer;
    opacity:.85;
    z-index:6;
    user-select:none;
    font-size:18px;
  }

  #achievements{
    position:fixed;
    top:44px;
    right:10px;
    width:210px;
    max-height:260px;
    overflow:auto;
    background:#102238;
    border:1px solid #254566;
    border-radius:12px;
    padding:10px;
    display:none;
    z-index:6;
    font-size:12px;
    line-height:1.45;
    box-shadow:0 8px 20px rgba(0,0,0,.35);
  }

  #achievements .locked{
    opacity:.5;
  }

  #achievements .title{
    font-weight:700;
    margin-bottom:6px;
  }

  canvas{
    display:block;
    width:100vw;
    height:calc(100vh - 138px);
    margin-top:72px;
    background:#0d2136;
  }

  #controls{
    position:fixed;
    bottom:10px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:10px;
    z-index:5;
    flex-wrap:wrap;
    padding:0 10px;
  }

  button{
    border:none;
    padding:10px 16px;
    border-radius:999px;
    background:var(--blue);
    color:white;
    font-size:14px;
    cursor:pointer;
    min-width:120px;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }

  button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  #buy10{ background:var(--blue2); }
  #buyMax{ background:var(--blue3); }
  #prestige{ background:var(--purple); }

  @media (max-width: 720px){
    #topbar{
      gap:10px;
      font-size:12px;
      padding-right:34px;
    }

    #gameTitle{
      top:58px;
      font-size:17px;
    }

    #statusText{
      top:108px;
      font-size:13px;
    }

    canvas{
      height:calc(100vh - 150px);
      margin-top:84px;
    }

    button{
      min-width:108px;
      font-size:13px;
      padding:10px 12px;
    }

    #achievements{
      width:180px;
    }

    #studioTag{
      font-size:10px;
    }
  }
</style>
</head>
<body>

<div id="topbar">
  <span>coins: <span id="coins">0</span></span>
  <span>shrimp: <span id="shrimp">1</span></span>
  <span>shells: <span id="shells">0</span></span>
  <span>type: <span id="shrimpType">Cherry Red</span></span>
</div>

<div id="gameTitle">
  Shrimp Idle
  <div id="studioTag">Shrimplicity Games ©</div>
</div>

<div id="statusText"></div>

<div id="achBtn">🏆</div>
<div id="achievements"></div>

<canvas id="c"></canvas>

<div id="controls">
  <button id="buy">Buy shrimp (10)</button>
  <button id="buy10">Buy 10</button>
  <button id="buyMax">Buy max</button>
  <button id="prestige">Prestige (500)</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const titleEl = document.getElementById("gameTitle");
const buyBtn = document.getElementById("buy");
const buy10Btn = document.getElementById("buy10");
const buyMaxBtn = document.getElementById("buyMax");
const prestigeBtn = document.getElementById("prestige");
const coinsEl = document.getElementById("coins");
const shrimpEl = document.getElementById("shrimp");
const shellsEl = document.getElementById("shells");
const shrimpTypeEl = document.getElementById("shrimpType");
const achBtn = document.getElementById("achBtn");
const achPanel = document.getElementById("achievements");
const statusTextEl = document.getElementById("statusText");
const MAX_OFFLINE_SECONDS = 60 * 60 * 4;
const BREED_RATE_PER_SHRIMP = 0.00005;

function canvasHeight(){
  return Math.max(220, window.innerHeight - (window.innerWidth <= 720 ? 150 : 138));
}

function resize(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const h = canvasHeight();
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

const SAVE_KEY = "shrimp_idle_variants_v1_1_polished";
const VERSION = "1.1";

const shrimpVariants = [
  {name:"Cherry Red", color:"#d62828"},
  {name:"Sakura Red", color:"#c81d25"},
  {name:"Bloody Mary", color:"#8b0000"},
  {name:"Fire Red", color:"#e63946"},
  {name:"Painted Fire Red", color:"#b11226"},

  {name:"Blue Dream", color:"#1d4ed8"},
  {name:"Blue Velvet", color:"#2563eb"},
  {name:"Blue Jelly", color:"#60a5fa"},

  {name:"Yellow", color:"#facc15"},
  {name:"Yellow Neon", color:"#fde047"},
  {name:"Golden Back", color:"#fbbf24"},

  {name:"Orange Sakura", color:"#f97316"},
  {name:"Orange Rili", color:"#fb923c", pattern:"rili", accent:"#f6efe7"},

  {name:"Green Jade", color:"#22c55e"},
  {name:"Jade Rili", color:"#4ade80", pattern:"rili", accent:"#eefaf1"},

  {name:"Chocolate", color:"#5a3a2e"},
  {name:"Black Rose", color:"#111111"},
  {name:"Carbon Rili", color:"#1f2937", pattern:"rili", accent:"#e8edf5"},

  {name:"Snowball", color:"#e5e7eb"},
  {name:"White Pearl", color:"#f8fafc"},

  {name:"Wild Type", color:"#6b7280"},

  {name:"Red Rili", color:"#ef4444", pattern:"rili", accent:"#fff1f1"},
  {name:"Blue Rili", color:"#3b82f6", pattern:"rili", accent:"#eef5ff"},
  {name:"Black Rili", color:"#111827", pattern:"rili", accent:"#f3f4f6"},

  {name:"Metallic Purple", color:"#7c3aed"}
];

const achievements = [
  { id:"s5",   name:"Tiny Colony",     test:s=>s.shrimp>=5 },
  { id:"s10",  name:"Busy Jar",        test:s=>s.shrimp>=10 },
  { id:"s25",  name:"Shrimp Crowd",    test:s=>s.shrimp>=25 },
  { id:"s50",  name:"Absolute Chaos",  test:s=>s.shrimp>=50 },
  { id:"sh1",  name:"First Shell",     test:s=>s.shells>=1 },
  { id:"sh5",  name:"Shell Pile",      test:s=>s.shells>=5 },
  { id:"sh10", name:"Calcium Hoard",   test:s=>s.shells>=10 },
  { id:"m1",   name:"First Mutation",  test:s=>s.mutationsSeen>=1 },
  { id:"m3",   name:"Lucky Genetics",  test:s=>s.mutationsSeen>=3 },
  { id:"p5",   name:"Color Theory",    test:s=>s.prestige>=5 },
  { id:"p10",  name:"Deep Run",        test:s=>s.prestige>=10 },
  { id:"p25",  name:"Chromatic End",   test:s=>s.prestige>=25 }
];

const milestones = [
  { threshold: 5, text: "It starts again." },
  { threshold: 10, text: "More come quietly." },
  { threshold: 25, text: "Something keeps going." },
  { threshold: 50, text: "Life shows up anyway." },
  { threshold: 100, text: "The quiet fills in." },
  { threshold: 250, text: "Time keeps passing." },
  { threshold: 500, text: "There is more here now." },
  { threshold: 1000, text: "Some things grow. Some things no longer grow." }
];

const prestigeMessages = [
  "It is replaced.",
  "Nothing remains.",
  "The previous state is gone.",
  "The outcome repeats.",
  "It is removed again.",
  "Progress becomes absence.",
  "Only the count continues.",
  "The prior version cannot return.",
  "Loss is incorporated.",
  "Continuation requires deletion.",
  "Each cycle reduces what existed.",
  "The record is incomplete.",
  "The system forgets intentionally.",
  "Previous forms are discarded.",
  "The earlier state is inaccessible.",
  "Removal enables continuation.",
  "The result replaces the process.",
  "Nothing persists except change.",
  "The sequence advances.",
  "The cycle stabilizes.",
  "Erasure becomes routine.",
  "The difference narrows.",
  "The structure holds.",
  "Continuation is automatic.",
  "The distinction fades."
];

let state = {
  coins: 0,
  shrimp: 1,
  shells: 0,
  prestige: 0,
  mutantCount: 0,
  list: [],
  mutationsSeen: 0,
  achievements: [],
  triggeredMilestones: [],
  breedProgress: 0,
  lastSavedAt: Date.now(),
  flash: 0,
  lastFrameTime: 0,
  saveTimer: 0
};

let currentStatusTimeout = 0;
let currentStatusShowing = false;
let statusQueue = [];

let cachedBuyMaxCount = 0;
let cachedBuyMaxCoins = -1;
let cachedBuyMaxShrimp = -1;

function invalidateBuyMaxCache(){
  cachedBuyMaxCount = 0;
  cachedBuyMaxCoins = -1;
  cachedBuyMaxShrimp = -1;
}

function saveGame(){
  state.lastSavedAt = Date.now();

  const data = {
    coins: state.coins,
    shrimp: state.shrimp,
    shells: state.shells,
    prestige: state.prestige,
    mutantCount: state.mutantCount,
    list: state.list,
    mutationsSeen: state.mutationsSeen,
    achievements: state.achievements,
    triggeredMilestones: state.triggeredMilestones,
    breedProgress: state.breedProgress,
    lastSavedAt: state.lastSavedAt
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    state = { ...state, ...data };

    if(typeof state.lastFrameTime !== "number") state.lastFrameTime = 0;
    if(typeof state.saveTimer !== "number") state.saveTimer = 0;
    if(typeof state.mutantCount !== "number") state.mutantCount = 0;
    if(typeof state.breedProgress !== "number") state.breedProgress = 0;
    if(typeof state.lastSavedAt !== "number") state.lastSavedAt = Date.now();
    if(!Array.isArray(state.list)) state.list = [];
    if(!Array.isArray(state.achievements)) state.achievements = [];
    if(!Array.isArray(state.triggeredMilestones)) state.triggeredMilestones = [];

    const visibleMutants = state.list.filter(s => s && s.mutant).length;
    if(state.mutantCount < visibleMutants) state.mutantCount = visibleMutants;
    if(state.mutantCount > state.shrimp) state.mutantCount = state.shrimp;
  } catch(e){
    console.error("Load failed:", e);
  }
}
loadGame();

function formatNumber(n){
  if(n >= 1000000) return (n / 1000000).toFixed(2).replace(/\.00$/, "") + "M";
  if(n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return Math.floor(n).toString();
}

function shrimpCostForCount(count){
  return Math.floor(8 * Math.pow(1.09, count - 1));
}

function shrimpCost(){
  return shrimpCostForCount(state.shrimp);
}

function prestigeCost(){
  return Math.floor(250 * Math.pow(1.75, state.prestige));
}

function totalCostForNextShrimp(amount){
  let total = 0;
  let tempShrimp = state.shrimp;
  for(let i = 0; i < amount; i++){
    total += shrimpCostForCount(tempShrimp);
    tempShrimp++;
  }
  return total;
}

function affordableShrimpCount(){
  let total = 0;
  let count = 0;
  let tempShrimp = state.shrimp;
  const coins = state.coins;

  while(true){
    const cost = shrimpCostForCount(tempShrimp);
    if(total + cost > coins) break;
    total += cost;
    tempShrimp++;
    count++;
    if(count >= 10000) break;
  }

  return count;
}

function getCachedBuyMaxCount(){
  const flooredCoins = Math.floor(state.coins);
  if(cachedBuyMaxCoins !== flooredCoins || cachedBuyMaxShrimp !== state.shrimp){
    cachedBuyMaxCoins = flooredCoins;
    cachedBuyMaxShrimp = state.shrimp;
    cachedBuyMaxCount = affordableShrimpCount();
  }
  return cachedBuyMaxCount;
}

function incomePerSecond(){
  const normalCount = Math.max(0, state.shrimp - state.mutantCount);
  const totalValue = normalCount + state.mutantCount * 3;
  return (totalValue + 1) * (1 + state.shells * 0.45);
}

function mutationChance(){
  return 0.01 + state.prestige * 0.005;
}

function currentVariant(){
  if(state.prestige >= shrimpVariants.length){
    return null;
  }
  return shrimpVariants[state.prestige];
}

function currentShrimpType(){
  const v = currentVariant();
  return v ? v.name : "Chaos Morph";
}

function currentPrestigeMessage(){
  const idx = Math.max(0, Math.min(state.prestige - 1, prestigeMessages.length - 1));
  return prestigeMessages[idx];
}

function currentTitleColor(t){
  if(state.prestige >= shrimpVariants.length){
    return shrimpVariants[Math.floor(t / 300) % shrimpVariants.length].color;
  }
  return currentVariant().color;
}

function enqueueStatus(text, duration = 4500, delay = 400){
  if(!text) return;
  statusQueue.push({
    text,
    duration,
    delay,
    createdAt: performance.now()
  });
}

function showStatus(text, duration = 4500, delay = 400){
  enqueueStatus(text, duration, delay);
}

function updateStatusText(now){
  if(currentStatusShowing && currentStatusTimeout && now > currentStatusTimeout){
    statusTextEl.style.opacity = "0";
    currentStatusShowing = false;
    currentStatusTimeout = 0;
  }

  if(!currentStatusShowing && statusQueue.length > 0){
    const next = statusQueue[0];
    if(now - next.createdAt >= next.delay){
      statusQueue.shift();
      statusTextEl.textContent = next.text;
      statusTextEl.style.opacity = "1";
      currentStatusShowing = true;
      currentStatusTimeout = now + next.duration;
    }
  }
}

function applyOfflineProgress(){
  const elapsedMs = Math.max(0, Date.now() - (state.lastSavedAt || Date.now()));
  const offlineSeconds = Math.min(MAX_OFFLINE_SECONDS, elapsedMs / 1000);

  if(offlineSeconds < 10) return;

  const earned = incomePerSecond() * offlineSeconds;
  state.coins += earned;
  invalidateBuyMaxCache();
  showStatus(`Welcome back. The colony earned ${formatNumber(earned)} coins while you were away.`, 6500, 700);
}

function checkMilestones(){
  for(const m of milestones){
    if(state.shrimp >= m.threshold && !state.triggeredMilestones.includes(m.threshold)){
      state.triggeredMilestones.push(m.threshold);
      showStatus(m.text, 5200, 400);
    }
  }
}

function passiveBreed(dtSec){
  state.breedProgress += state.shrimp * BREED_RATE_PER_SHRIMP * dtSec;

  let births = 0;
  while(state.breedProgress >= 1 && births < 500){
    addSingleShrimp();
    state.breedProgress -= 1;
    births++;
  }

  if(births > 0){
    syncShrimp();
    unlockAchievements();
    invalidateBuyMaxCache();
  }
}

function jar(){
  const usableHeight = canvasHeight();
  const w = Math.min(window.innerWidth * 0.78, 430);
  const h = Math.min(usableHeight * 0.72, 340);
  return {
    x: window.innerWidth / 2,
    y: usableHeight / 2 + 18,
    w,
    h
  };
}

function randomVariantIndex(){
  return Math.floor(Math.random() * shrimpVariants.length);
}

function currentVariantIndex(){
  if(state.prestige >= shrimpVariants.length){
    return randomVariantIndex();
  }
  return state.prestige;
}

function newShrimpVisual(mutantOverride = null){
  const j = jar();
  let mutant;
  if(mutantOverride === null){
    const ratio = state.shrimp > 0 ? state.mutantCount / state.shrimp : 0;
    mutant = Math.random() < ratio;
  } else {
    mutant = mutantOverride;
  }

  return {
    x: j.x + Math.random() * (j.w * 0.45) - j.w * 0.225,
    y: j.y + Math.random() * (j.h * 0.32) - j.h * 0.1,
    vx: (Math.random() - 0.5) * 0.55,
    vy: (Math.random() - 0.5) * 0.24,
    bob: Math.random() * 6.28,
    mutant,
    variantIndex: currentVariantIndex()
  };
}

function syncShrimp(){
  const visible = Math.min(state.shrimp, 80);
  while(state.list.length < visible){
    state.list.push(newShrimpVisual());
  }
  while(state.list.length > visible){
    state.list.pop();
  }
}

function addSingleShrimp(){
  const mutant = Math.random() < mutationChance();
  if(mutant){
    state.mutantCount++;
    state.mutationsSeen++;
  }

  state.shrimp++;

  if(state.list.length < 80){
    state.list.push(newShrimpVisual(mutant));
  }
}

function buyAmount(amount){
  if(amount <= 0) return;

  let bought = 0;
  for(let i = 0; i < amount; i++){
    const c = shrimpCost();
    if(state.coins < c) break;
    state.coins -= c;
    addSingleShrimp();
    bought++;
  }

  if(bought > 0){
    syncShrimp();
    unlockAchievements();
    invalidateBuyMaxCache();
    saveGame();
  }
}

function buyShrimp(){
  buyAmount(1);
}

function buyTen(){
  buyAmount(10);
}

function buyMax(){
  const amount = getCachedBuyMaxCount();
  if(amount > 0){
    buyAmount(amount);
  }
}

function doPrestige(){
  const c = prestigeCost();
  if(state.coins < c) return;

  state.shells++;
  state.prestige++;
  state.coins = 0;
  state.shrimp = 1;
  state.mutantCount = 0;
  state.breedProgress = 0;
  state.triggeredMilestones = [];
  state.list = [];
  state.flash = 1;

  syncShrimp();
  unlockAchievements();
  showStatus(currentPrestigeMessage(), 5200, 500);
  invalidateBuyMaxCache();
  saveGame();
}

buyBtn.onclick = buyShrimp;
buy10Btn.onclick = buyTen;
buyMaxBtn.onclick = buyMax;
prestigeBtn.onclick = doPrestige;

achBtn.onclick = () => {
  achPanel.style.display = achPanel.style.display === "block" ? "none" : "block";
};

function unlockAchievements(){
  for(const a of achievements){
    if(a.test(state) && !state.achievements.includes(a.id)){
      state.achievements.push(a.id);
    }
  }
}

function renderAchievements(){
  achPanel.innerHTML =
    `<div class="title">Achievements</div>` +
    achievements.map(a => {
      const unlocked = state.achievements.includes(a.id);
      return `<div class="${unlocked ? "" : "locked"}">${unlocked ? "✓" : "○"} ${a.name}</div>`;
    }).join("");
}

function drawBackground(){
  const usableHeight = canvasHeight();
  ctx.clearRect(0, 0, window.innerWidth, usableHeight);

  for(let i = 0; i < 8; i++){
    ctx.fillStyle = "rgba(255,255,255,.022)";
    ctx.fillRect(i * (window.innerWidth / 7), 0, 14, usableHeight);
  }

  if(state.prestige >= shrimpVariants.length){
    ctx.fillStyle = "rgba(140,90,255,.06)";
    ctx.fillRect(0, 0, window.innerWidth, usableHeight);
  }

  for(let i = 0; i < 24; i++){
    ctx.fillStyle = "rgba(255,255,255,.025)";
    const px = (i * 131) % Math.max(1, window.innerWidth);
    const py = (i * 59) % Math.max(1, usableHeight);
    ctx.fillRect(px, py, 2, 2);
  }
}

function drawJar(){
  const j = jar();

  ctx.strokeStyle = "#9dd3ff";
  ctx.lineWidth = 4;
  ctx.strokeRect(j.x - j.w/2, j.y - j.h/2, j.w, j.h);

  ctx.fillStyle = "#12395a";
  ctx.fillRect(j.x - j.w/2, j.y - j.h/2 + 36, j.w, j.h - 36);

  ctx.fillStyle = "#1d4a70";
  ctx.fillRect(j.x - j.w/2, j.y - j.h/2 + 36, j.w, 14);

  ctx.fillStyle = "#2a2622";
  ctx.fillRect(j.x - j.w/2, j.y + j.h/2 - 30, j.w, 30);

  ctx.fillStyle = "rgba(255,255,255,.12)";
  ctx.fillRect(j.x - j.w/2 + 14, j.y - j.h/2 + 16, 10, j.h - 40);

  for(let i = 0; i < 5; i++){
    const t = performance.now() * 0.03;
    const bx = j.x + j.w * 0.28 + Math.sin(i + t / 35) * 10;
    const by = j.y + j.h / 2 - 20 - ((t + i * 55) % Math.max(20, j.h - 80));
    ctx.fillStyle = "rgba(220,240,255,.6)";
    ctx.beginPath();
    ctx.arc(bx, by, Math.max(1.5, 4 - i * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlants(){
  const j = jar();
  const baseY = j.y + j.h/2 - 2;
  const left = j.x - j.w/2 + 34;

  let phase = 0;
  if(state.shrimp >= 2) phase = 1;
  if(state.shrimp >= 4) phase = 2;
  if(state.shrimp >= 7) phase = 3;
  if(state.shrimp >= 11) phase = 4;
  if(state.shrimp >= 16) phase = 5;
  if(state.shrimp >= 24) phase = 6;
  if(state.shrimp >= 36) phase = 7;
  if(state.shrimp >= 52) phase = 8;

  for(let i = 0; i < phase; i++){
    const x = left + i * 22;
    const h = 16 + phase * 4 + i * 2;

    ctx.strokeStyle = "#2fd06d";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.quadraticCurveTo(x - 5, baseY - h * 0.5, x - 10, baseY - h);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x + 2, baseY);
    ctx.quadraticCurveTo(x + 6, baseY - h * 0.55, x + 11, baseY - h * 0.92);
    ctx.stroke();

    if(phase >= 3){
      ctx.strokeStyle = "#41dd7e";
      ctx.beginPath();
      ctx.moveTo(x + 1, baseY - h * 0.45);
      ctx.lineTo(x - 7, baseY - h * 0.58);
      ctx.moveTo(x + 1, baseY - h * 0.62);
      ctx.lineTo(x + 9, baseY - h * 0.77);
      ctx.stroke();
    }

    if(phase >= 6 && i % 2 === 0){
      ctx.strokeStyle = "#2aba60";
      ctx.beginPath();
      ctx.moveTo(x + 5, baseY);
      ctx.quadraticCurveTo(x + 10, baseY - h * 0.45, x + 14, baseY - h * 0.78);
      ctx.stroke();
    }
  }
}

function drawShells(){
  const j = jar();
  const baseX = j.x - j.w/2 + 42;
  const y = j.y + j.h/2 - 12;

  for(let i = 0; i < Math.min(state.shells, 25); i++){
    const x = baseX + (i % 10) * 16 + (Math.floor(i / 10) * 4);
    const yy = y - (i % 2) * 2 - Math.floor(i / 10) * 3;

    ctx.strokeStyle = "#ede7ff";
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(x, yy, 4, 0.3, Math.PI * 1.9);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, yy, 2.1, 0.3, Math.PI * 1.8);
    ctx.stroke();
  }
}

function hexToRgb(hex){
  hex = hex.replace("#", "");
  if(hex.length === 3){
    hex = hex.split("").map(c => c + c).join("");
  }
  const num = parseInt(hex, 16);
  return {
    r:(num >> 16) & 255,
    g:(num >> 8) & 255,
    b:num & 255
  };
}

function lighten(hex, amount){
  const {r, g, b} = hexToRgb(hex);
  const nr = Math.round(r + (255 - r) * amount);
  const ng = Math.round(g + (255 - g) * amount);
  const nb = Math.round(b + (255 - b) * amount);
  return `rgb(${nr},${ng},${nb})`;
}

function shrimpPalette(s){
  const variant = shrimpVariants[s.variantIndex % shrimpVariants.length];
  let baseColor = variant.color;
  let accentColor = variant.accent || lighten(variant.color, 0.85);

  if(s.mutant){
    baseColor = lighten(baseColor, 0.45);
    accentColor = lighten(accentColor, 0.2);
  }

  return {
    base: baseColor,
    accent: accentColor,
    pattern: variant.pattern || null
  };
}

function drawPixels(pixels, ox, oy, color){
  ctx.fillStyle = color;
  for(const [px, py] of pixels){
    ctx.fillRect(ox + px, oy + py, 1, 1);
  }
}

function drawShrimp(s, t){
  const x = Math.round(s.x);
  const y = Math.round(s.y + Math.sin(s.bob) * 2);
  const dir = s.vx >= 0 ? 1 : -1;
  const pal = shrimpPalette(s);

  const outline = [
    [-13,-5],[-12,-6],[-11,-7],[-10,-8],
    [-12,-2],[-11,-3],[-10,-4],[-9,-5],

    [-13,0],[-13,1],
    [-12,-1],[-12,0],[-12,1],[-12,2],
    [-11,-1],[-11,0],[-11,1],[-11,2],
    [-10,-2],[-10,-1],[-10,0],[-10,1],[-10,2],
    [-9,-2],[-9,-1],[-9,0],[-9,1],[-9,2],
    [-8,-2],[-8,-1],[-8,0],[-8,1],[-8,2],
    [-7,-2],[-7,-1],[-7,0],[-7,1],[-7,2],
    [-6,-2],[-6,-1],[-6,0],[-6,1],[-6,2],
    [-5,-2],[-5,-1],[-5,0],[-5,1],[-5,2],
    [-4,-2],[-4,-1],[-4,0],[-4,1],[-4,2],
    [-3,-2],[-3,-1],[-3,0],[-3,1],[-3,2],
    [-2,-2],[-2,-1],[-2,0],[-2,1],[-2,2],
    [-1,-2],[-1,-1],[-1,0],[-1,1],[-1,2],
    [0,-2],[0,-1],[0,0],[0,1],[0,2],
    [1,-2],[1,-1],[1,0],[1,1],[1,2],
    [2,-2],[2,-1],[2,0],[2,1],[2,2],
    [3,-2],[3,-1],[3,0],[3,1],[3,2],
    [4,-2],[4,-1],[4,0],[4,1],[4,2],
    [5,-1],[5,0],[5,1],[5,2],
    [6,-1],[6,0],[6,1],[6,2],
    [7,0],[7,1],[7,2],[7,3],
    [8,0],[8,1],[8,2],[8,3],
    [9,1],[9,2],[9,3],
    [10,1],[10,2],[10,3],
    [11,2],[11,3],[11,4],

    [12,3],[12,4],[12,5],
    [13,4],[13,5],[13,6],

    [14,3],[14,4],
    [15,2],[15,3],
    [14,6],[15,6],
    [14,8],[15,8],
    [15,9],

    [-2,3],[-2,4],
    [0,3],[0,4],[0,5],
    [2,3],[2,4],[2,5],
    [4,3],[4,4]
  ];

  const fill = [
    [-11,0],[-11,1],
    [-10,-1],[-10,0],[-10,1],
    [-9,-1],[-9,0],[-9,1],
    [-8,-1],[-8,0],[-8,1],
    [-7,-1],[-7,0],[-7,1],
    [-6,-1],[-6,0],[-6,1],
    [-5,-1],[-5,0],[-5,1],
    [-4,-1],[-4,0],[-4,1],
    [-3,-1],[-3,0],[-3,1],
    [-2,-1],[-2,0],[-2,1],
    [-1,-1],[-1,0],[-1,1],
    [0,-1],[0,0],[0,1],
    [1,-1],[1,0],[1,1],
    [2,-1],[2,0],[2,1],
    [3,-1],[3,0],[3,1],
    [4,-1],[4,0],[4,1],
    [5,0],[5,1],
    [6,0],[6,1],
    [7,1],[7,2],
    [8,1],[8,2],
    [9,2],
    [10,2],
    [11,3],
    [12,4],
    [13,5],
    [14,4],
    [14,6],
    [14,8]
  ];

  const riliAccent = [
    [-2,-1],[-2,0],[-2,1],
    [-1,-1],[-1,0],[-1,1],
    [0,-1],[0,0],[0,1],
    [1,-1],[1,0],[1,1],
    [2,-1],[2,0],[2,1]
  ];

  const highlights = [
    [-7,-1],[-6,-1],[-4,-1],[-3,-1],[0,-1],[12,4]
  ];

  const riliHighlight = [
    [-1,-1],[0,-1],[1,-1]
  ];

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);

  drawPixels(outline, 0, 0, "#000000");
  drawPixels(fill, 0, 0, pal.base);

  if(pal.pattern === "rili"){
    drawPixels(riliAccent, 0, 0, pal.accent);
    drawPixels(riliHighlight, 0, 0, s.mutant ? "rgba(255,255,255,.95)" : "rgba(255,255,255,.35)");
  }

  drawPixels(highlights, 0, 0, s.mutant ? "rgba(255,255,255,.85)" : "rgba(255,255,255,.22)");

  ctx.fillStyle = "#000000";
  ctx.fillRect(-8, 0, 1, 1);

  ctx.restore();

  if(s.mutant){
    const sparkle = (Math.sin(t / 220 + s.bob * 10) + 1) / 2;
    if(sparkle > 0.82){
      ctx.fillStyle = "#fff8ff";
      ctx.fillRect(x - 5, y - 5, 1, 1);
      ctx.fillRect(x + 6, y - 1, 1, 1);
      ctx.fillRect(x, y + 5, 1, 1);
    }
  }
}

function updateShrimp(){
  const j = jar();
  const left = j.x - j.w/2 + 16;
  const right = j.x + j.w/2 - 16;
  const top = j.y - j.h/2 + 46;
  const bottom = j.y + j.h/2 - 38;

  for(const s of state.list){
    if(Math.random() < 0.008) s.vx += (Math.random() - 0.5) * 0.25;
    if(Math.random() < 0.008) s.vy += (Math.random() - 0.5) * 0.12;

    s.vx = Math.max(-0.8, Math.min(0.8, s.vx));
    s.vy = Math.max(-0.35, Math.min(0.35, s.vy));

    s.x += s.vx;
    s.y += s.vy;
    s.bob += 0.08;

    s.x += (j.x - s.x) * 0.0008;
    s.y += (j.y + 42 - s.y) * 0.0006;

    if(s.x < left || s.x > right) s.vx *= -1;
    if(s.y < top || s.y > bottom) s.vy *= -1;
  }
}

function drawFlash(){
  if(state.flash <= 0) return;
  const usableHeight = canvasHeight();
  ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.18})`;
  ctx.fillRect(0, 0, window.innerWidth, usableHeight);
  state.flash -= 0.02;
}

function updateUI(t){
  titleEl.style.color = currentTitleColor(t);

  coinsEl.innerText = formatNumber(state.coins);
  shrimpEl.innerText = formatNumber(state.shrimp);
  shellsEl.innerText = state.shells;
  shrimpTypeEl.innerText = currentShrimpType();

  const oneCost = shrimpCost();
  const tenCost = totalCostForNextShrimp(10);
  const maxCount = getCachedBuyMaxCount();

  buyBtn.innerText = `Buy shrimp (${formatNumber(oneCost)})`;
  buy10Btn.innerText = `Buy 10 (${formatNumber(tenCost)})`;
  buyMaxBtn.innerText = `Buy max (${maxCount})`;
  prestigeBtn.innerText = `Prestige (${formatNumber(prestigeCost())})`;

  buyBtn.disabled = state.coins < oneCost;
  buy10Btn.disabled = state.coins < tenCost;
  buyMaxBtn.disabled = maxCount <= 0;
  prestigeBtn.disabled = state.coins < prestigeCost();
}

function loop(t){
  if(!state.lastFrameTime) state.lastFrameTime = t;

  const dtMs = Math.min(100, t - state.lastFrameTime);
  state.lastFrameTime = t;
  const dtSec = dtMs / 1000;

  state.coins += incomePerSecond() * dtSec;

  passiveBreed(dtSec);
  updateShrimp();
  unlockAchievements();
  checkMilestones();
  renderAchievements();

  drawBackground();
  drawJar();
  drawPlants();
  drawShells();

  for(const s of state.list){
    drawShrimp(s, t);
  }

  drawFlash();
  updateUI(t);
  updateStatusText(t);

  state.saveTimer += dtMs;
  if(state.saveTimer >= 5000){
    state.saveTimer = 0;
    saveGame();
  }

  requestAnimationFrame(loop);
}

applyOfflineProgress();
unlockAchievements();
checkMilestones();
syncShrimp();
renderAchievements();
invalidateBuyMaxCache();

window.addEventListener("beforeunload", saveGame);
document.addEventListener("visibilitychange", () => {
  if(document.hidden) saveGame();
});

requestAnimationFrame(loop);
</script>
