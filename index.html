<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shrimplicity Games</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1f2a, #050c12);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* container */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
}

/* glass effect */
.glass {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 40px rgba(0,150,255,0.08);
}

/* artwork */
.hero-art {
  width: 100%;
  height: auto;
  border-radius: 16px;
}

/* buttons */
.buttons {
  margin-top: 25px;
}

.buttons a {
  display: inline-block;
  margin: 10px;
  padding: 14px 24px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;

  background: rgba(0,150,255,0.1);
  border: 1px solid rgba(0,150,255,0.4);

  transition: all 0.2s ease;
}

.buttons a:hover {
  background: rgba(0,150,255,0.3);
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(0,150,255,0.5);
}

/* subtle bubbles */
.bubbles {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  top: 0;
  left: 0;
}

.bubble {
  position: absolute;
  bottom: -50px;
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  animation: rise 10s linear infinite;
}

@keyframes rise {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="bubbles">
  <div class="bubble" style="left:10%; animation-delay:0s;"></div>
  <div class="bubble" style="left:30%; animation-delay:2s;"></div>
  <div class="bubble" style="left:60%; animation-delay:4s;"></div>
  <div class="bubble" style="left:80%; animation-delay:1s;"></div>
</div>

<div class="container">
  <div class="glass">

    <img src="homepage-art.png" class="hero-art"/>

    <div class="buttons">
      <a href="shrimp-idle.html">Play</a>
      <a href="aquanomy.html">Play</a>
      <a href="biofall.html">Play</a>
    </div>

  </div>
</div>

</body>
</html>
