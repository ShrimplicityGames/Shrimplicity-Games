<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shrimplicity Games</title>

  <style>
    body {
      margin: 0;
      background: #07121a;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    /* Prevent side scrolling */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Artwork image */
    .hero-art {
      width: 100%;
      max-width: 1200px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid rgba(0, 200, 255, 0.4);
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .buttons a:hover {
      background: rgba(0, 200, 255, 0.3);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- YOUR ARTWORK -->
    <img src="homepage-art.png" alt="Shrimplicity Homepage" class="hero-art"/>

    <!-- BUTTONS -->
    <div class="buttons">
      <a href="shrimp-idle.html">Play</a>
      <a href="aquanomy.html">Play</a>
      <a href="biofall.html">Play</a>
    </div>

  </div>

</body>
</html>
